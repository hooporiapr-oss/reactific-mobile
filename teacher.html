<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reactific Teacher Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0B1F3A 0%, #1a3a52 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(255,255,255,.1);
    }
    .header h1 {
      color: #fff;
      font-size: 2rem;
    }
    .header-info {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #uname {
      color: #fff;
      font-size: 1rem;
    }
    .btn-signout {
      padding: 10px 20px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-signout:hover {
      background: rgba(255,255,255,.2);
    }
    .create-class {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      backdrop-filter: blur(10px);
    }
    .field-label {
      color: #8892a0;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .input {
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08);
      color: #333;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    .input::placeholder {
      color: #aaa;
    }
    .btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #008CFF 0%, #0066cc 100%);
      border: none;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,140,255,.3);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #c53030;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .classes-title {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      margin: 32px 0 20px 0;
    }
    #classSearch {
      width: 100%;
      max-width: 560px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: #fff;
      font-size: 0.9rem;
      margin-bottom: 16px;
      outline: none;
    }
    #classSearch::placeholder {
      color: rgba(255,255,255,.5);
    }
    #classes-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .class-card {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .card-header {
      margin-bottom: 16px;
    }
    .class-name {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn, .refresh-btn {
      padding: 8px 12px;
      background: rgba(0,140,255,.2);
      border: 1px solid rgba(0,140,255,.3);
      color: #00a8ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .mode-btn:hover, .refresh-btn:hover {
      background: rgba(0,140,255,.3);
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #8892a0;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,.2);
      border-top: 3px solid #008CFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>REACTIFIC™</h1>
    <div class="header-info">
      <div id="uname">Teacher</div>
      <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="create-class">
    <div class="field-label">Create a New Class</div>
    <input class="input" id="class-name" placeholder="Grade 6 Science" autocomplete="off">
    <button class="btn" id="create-btn" onclick="createClass()">Create Class</button>
    <div class="error" id="create-error"></div>
  </div>

  <div class="classes-title">MY CLASSES</div>
  <input type="text" id="classSearch" placeholder="🔍 Search classes..." oninput="filterClasses(this.value)">
  <div id="classes-wrap">
    <div class="empty-state">
      <div class="spinner"></div> Loading classes...
    </div>
  </div>
</div>

<script>
var API='https://api.reactificgaming.com';

// 1. HANDLE QUERY PARAMS — cross-domain token pass
var params=new URLSearchParams(window.location.search);
if(params.get('token')&&params.get('user')){
  try{
    localStorage.setItem('rct-token',params.get('token'));
    localStorage.setItem('rct-user',params.get('user'));
    window.history.replaceState({},document.title,window.location.pathname);
  }catch(e){console.error('Token save error:',e)}
}

// 2. GET TOKEN & USER
var token=localStorage.getItem('rct-token');
var user=null;
try{
  user=JSON.parse(localStorage.getItem('rct-user')||'null');
}catch(e){user=null}

// 3. AUTH CHECK
if(!token||!user){
  window.location.href='/index.html';
  throw new Error('Not logged in');
}

// 4. SET USERNAME
document.getElementById('uname').textContent=user.username||'Teacher';

// 5. SIGNOUT
function signOut(){
  localStorage.removeItem('rct-token');
  localStorage.removeItem('rct-user');
  window.location.href='/index.html';
}

// 6. CREATE CLASS
async function createClass(){
  var name=document.getElementById('class-name').value.trim();
  if(!name){document.getElementById('create-error').textContent='Enter a class name';return}
  var btn=document.getElementById('create-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creating...';
  document.getElementById('create-error').textContent='';
  try{
    var res=await fetch(API+'/api/classes/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name})});
    var data=await res.json();
    if(!res.ok)throw new Error(data.error||'Could not create class');
    document.getElementById('class-name').value='';
    loadClasses();
  }catch(e){document.getElementById('create-error').textContent=e.message}
  btn.disabled=false;btn.textContent='Create Class';
}

// 7. FILTER CLASSES
function filterClasses(query){
  var q=query.toLowerCase().trim();
  document.querySelectorAll('.class-card').forEach(function(card){
    var name=card.querySelector('.class-name');
    card.style.display=(!q||name.textContent.toLowerCase().includes(q))?'':'none';
  });
}

// 8. LOAD CLASSES
async function loadClasses(){
  var wrap=document.getElementById('classes-wrap');
  wrap.innerHTML='<div class="empty-state"><div class="spinner"></div> Loading...</div>';
  try{
    var controller=new AbortController();
    var timeoutId=setTimeout(function(){controller.abort()},8000);
    var res=await fetch(API+'/api/classes/teaching',{headers:{'Authorization':'Bearer '+token},signal:controller.signal});
    clearTimeout(timeoutId);
    if(!res.ok){wrap.innerHTML='<div class="empty-state">Could not load classes</div>';return}
    var data=await res.json();
    var classes=data.classes||[];
    if(!classes.length){wrap.innerHTML='<div class="empty-state">No classes yet</div>';return}
    wrap.innerHTML=classes.map(function(cls){return '<div class="class-card"><div class="card-header"><div class="class-name">'+cls.name+'</div><div style="font-size:.7rem;color:#8892a0">'+cls.student_count+' students</div></div><div class="card-actions"><button class="mode-btn" onclick="setDisplayMode('+cls.id+')">👤 Names</button><button class="refresh-btn" onclick="loadDashboard('+cls.id+')">🔄 Scores</button></div><div id="dash-'+cls.id+'"><div style="text-align:center;padding:12px;color:#8892a0;font-size:.8rem">Click Scores to load</div></div></div>'}).join('');
  }catch(e){wrap.innerHTML='<div class="empty-state">Error loading classes</div>';console.error('Error:',e)}
}

// 9. LOAD DASHBOARD
async function loadDashboard(classId){
  var dash=document.getElementById('dash-'+classId);
  dash.innerHTML='<div style="text-align:center;padding:8px"><div class="spinner"></div></div>';
  try{
    var controller=new AbortController();
    var timeoutId=setTimeout(function(){controller.abort()},8000);
    var res=await fetch(API+'/api/classes/'+classId+'/dashboard',{headers:{'Authorization':'Bearer '+token},signal:controller.signal});
    clearTimeout(timeoutId);
    if(!res.ok){dash.innerHTML='<div style="color:#c53030">Error</div>';return}
    var data=await res.json();
    var students=data.students||[];
    if(!students.length){dash.innerHTML='<div style="color:#8892a0">No scores yet</div>';return}
    dash.innerHTML=students.map(function(s){return '<div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;padding:8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.75rem;color:#fff"><div>'+s.username+'</div><div>'+s.score+'</div><div>L'+s.level+'</div></div>'}).join('');
  }catch(e){dash.innerHTML='<div style="color:#c53030">Error loading</div>';console.error('Error:',e)}
}

// 10. SET DISPLAY MODE
async function setDisplayMode(classId){
  try{
    var res=await fetch(API+'/api/classes/'+classId+'/display-mode',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({display_mode:'initials'})});
    if(res.ok)loadDashboard(classId);
  }catch(e){console.error('Error:',e)}
}

// 11. INIT
loadClasses();
</script>

</body>
</html>
