<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge Complete! | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at center,#1a1a00 0%,#000 70%);
  height:100vh;
  padding:20px;
  overflow-y:auto;
}

.container{text-align:center;max-width:600px;padding-bottom:40px}

.celebration{
  font-size:4rem;
  margin-bottom:16px;
  animation:bounce 0.6s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
}

.title{
  font-size:2.4rem;
  font-weight:900;
  background:linear-gradient(135deg,#ffd35a,#00D9A5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.1em;
}

.subtitle{
  font-size:1.2rem;
  color:#ffd35a;
  margin-bottom:32px;
  font-weight:900;
}

.content{
  background:linear-gradient(135deg,rgba(255,211,90,.15),rgba(0,217,165,.1));
  border:3px solid #ffd35a;
  border-radius:20px;
  padding:40px 32px;
  margin-bottom:32px;
  box-shadow:0 0 60px rgba(255,211,90,.4);
}

.challenge-name{
  font-size:.95rem;
  color:#00D9A5;
  text-transform:uppercase;
  letter-spacing:.15em;
  margin-bottom:24px;
  font-weight:900;
}

.score-display{
  margin-bottom:32px;
}

.score-label{
  font-size:.85rem;
  color:#8892a0;
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:12px;
}

.score-value{
  font-size:3.8rem;
  font-weight:900;
  color:#ffd35a;
  text-shadow:0 0 40px rgba(255,211,90,.8);
  margin-bottom:16px;
}

.congratulations{
  font-size:1rem;
  color:#00D9A5;
  line-height:1.8;
  font-weight:600;
  margin-bottom:24px;
}

.achievement{
  background:rgba(155,89,182,.2);
  border:2px solid rgba(155,89,182,.4);
  border-radius:12px;
  padding:16px;
  margin-bottom:24px;
}

.achievement-icon{font-size:2.4rem;margin-bottom:8px}

.achievement-text{
  font-size:.9rem;
  color:#9B59B6;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.1em;
}

.buttons{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:14px 28px;
  border:none;
  border-radius:10px;
  font-size:.85rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  text-decoration:none;
  transition:all .2s;
  display:inline-block;
}

.btn-again{
  background:linear-gradient(135deg,#ffd35a,#b8860b);
  color:#000;
  box-shadow:0 0 30px rgba(255,211,90,.6);
}
.btn-again:hover{
  transform:translateY(-2px);
  box-shadow:0 0 50px rgba(255,211,90,1);
}

.btn-next{
  background:linear-gradient(135deg,#00D9A5,#009b7d);
  color:#000;
  box-shadow:0 0 30px rgba(0,217,165,.5);
}
.btn-next:hover{
  transform:translateY(-2px);
  box-shadow:0 0 50px rgba(0,217,165,.8);
}

.btn-home{
  background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.2);
  color:#fff;
}
.btn-home:hover{
  background:rgba(255,255,255,.15);
}

@media (max-width:640px){
  .title{font-size:1.8rem}
  .score-value{font-size:2.8rem}
  .buttons{flex-direction:column}
  .btn{width:100%}
}
</style>
</head>
<body>

<div class="container">
  <div class="celebration">🏆</div>
  
  <div class="title">Challenge Complete!</div>
  <div class="subtitle" id="subtitle">Loading...</div>

  <div class="content">
    <div class="challenge-name" id="challenge-name">Challenge Name</div>
    
    <div class="score-display">
      <div class="score-label">Final Score</div>
      <div class="score-value" id="score">0</div>
    </div>

    <div class="congratulations" id="message">
      You've mastered the challenge. Your score is now on the leaderboard.
    </div>

    <div class="achievement" id="achievement-box">
      <div class="achievement-icon">⭐</div>
      <div class="achievement-text" id="achievement-text">Achievement Unlocked</div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-again" onclick="retryChallenge()">🔄 Try Again</button>
    <a class="btn btn-next" href="/challenge-select.html">⊞ Next Challenge</a>
    <a class="btn btn-home" href="/vr-home.html">← Home</a>
  </div>
</div>

<script>
var level=parseInt(sessionStorage.getItem('challenge-level'))||1;
var score=parseInt(sessionStorage.getItem('challenge-final-score'))||0;

var levelNames={
  1:'1-Game Challenge',
  2:'2-Game Challenge',
  3:'3-Game Challenge',
  4:'4-Game Challenge',
  5:'5-Game Challenge',
  6:'6-Game Gauntlet'
};

var achievements={
  1:{icon:'⚡',text:'Speed Demon'},
  2:{icon:'🧠',text:'Memory Master'},
  3:{icon:'👁️',text:'Visual Expert'},
  4:{icon:'🔢',text:'Math Wizard'},
  5:{icon:'🚀',text:'Elite Status'},
  6:{icon:'👑',text:'LEGENDARY CHAMPION'}
};

var levelName=levelNames[level]||'Challenge';
var achievement=achievements[level]||{icon:'⭐',text:'Champion'};

document.getElementById('subtitle').textContent=levelName;
document.getElementById('challenge-name').textContent=levelName;
document.getElementById('score').textContent=score.toLocaleString();
document.getElementById('achievement-icon').textContent=achievement.icon;
document.getElementById('achievement-text').textContent=achievement.text+' Unlocked';

var messages={
  1:'You dominated the single-game challenge. Speed and focus on point.',
  2:'Two games conquered. You made it through the sequence.',
  3:'Three games completed. You\'ve got serious endurance.',
  4:'Four games mastered. You\'re thinking like a champion.',
  5:'Five games conquered. You\'re nearly legendary.',
  6:'You completed the 6-Game Gauntlet. LEGENDARY STATUS UNLOCKED.'
};

document.getElementById('message').textContent=messages[level]||'You are a champion.';

function retryChallenge(){
  sessionStorage.setItem('challenge-idx',0);
  sessionStorage.setItem('challenge-score',0);
  window.location.href='/challenge.html?level='+level;
}
</script>

</body>
</html>
