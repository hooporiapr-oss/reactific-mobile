<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>VR Basketball - Original PICO WebVR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial,sans-serif}
canvas{display:block}
#overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;background:radial-gradient(ellipse at center,#210000 0%,#000 72%)}
#title{font-size:30px;font-weight:900;font-style:italic;letter-spacing:.06em}
#title span{color:#ff2948}
#sub{margin:8px 0 24px;color:#ff8597;font-size:12px;letter-spacing:.13em;text-transform:uppercase}
#enterBtn{min-width:210px;padding:17px 28px;border:0;border-radius:14px;background:#ff2948;color:#fff;font-size:18px;font-weight:900;cursor:pointer}
#enterBtn:active{transform:scale(.98)}
#status{max-width:520px;margin-top:16px;color:#c8ced8;font-size:13px;line-height:1.5}
#error{max-width:560px;margin-top:12px;color:#ffdf68;font-size:12px;line-height:1.45;white-space:pre-wrap}
#hud{position:fixed;z-index:10;top:12px;left:0;right:0;display:flex;justify-content:center;gap:8px;pointer-events:none}
.box{min-width:76px;padding:6px 10px;border:1px solid rgba(255,41,72,.5);border-radius:8px;background:rgba(0,0,0,.55);text-align:center}
.label{font-size:9px;color:#ff647c;text-transform:uppercase;font-weight:900}
.value{font-size:20px;font-weight:900}
</style>
</head>
<body>
<div id="overlay">
  <div id="title">VR <span>BASKETBALL</span></div>
  <div id="sub">Original PICO · Native WebVR build</div>
  <button id="enterBtn" type="button">ENTER VR</button>
  <div id="status">Loading the legacy VR engine…</div>
  <div id="error"></div>
</div>
<div id="hud">
  <div class="box"><div class="label">Makes</div><div class="value" id="makes">0</div></div>
  <div class="box"><div class="label">Misses</div><div class="value" id="misses">0</div></div>
  <div class="box"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
</div>

<!-- Three.js r110 still contains the native WebVR renderer required by older Firefox Reality. -->
<script src="https://cdn.jsdelivr.net/npm/three@0.110.0/build/three.min.js"></script>
<script>
(function(){
  'use strict';

  var statusEl = document.getElementById('status');
  var errorEl = document.getElementById('error');
  var overlay = document.getElementById('overlay');
  var enterBtn = document.getElementById('enterBtn');

  function showError(message){
    errorEl.textContent = message;
  }

  window.onerror = function(message, source, line, column){
    showError('JavaScript error: ' + message + ' (line ' + line + ')');
    return false;
  };

  if (!window.THREE) {
    statusEl.textContent = 'The 3D engine did not load.';
    showError('The headset may be unable to reach cdn.jsdelivr.net. Download three.min.js r110 and host it beside this HTML file, then change the script source to ./three.min.js.');
    return;
  }

  if (!navigator.getVRDisplays) {
    statusEl.textContent = 'This browser is not exposing the original WebVR API.';
    showError('Open this page inside Firefox Reality on the PICO headset. A normal desktop or mobile browser may not provide getVRDisplays().');
  }

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x090910);
  scene.fog = new THREE.Fog(0x090910, 8, 25);

  var camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 50);
  camera.position.set(0, 1.6, 0.4);
  scene.add(camera);

  var renderer = new THREE.WebGLRenderer({antialias:false, alpha:false});
  renderer.setPixelRatio(1);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.vr.enabled = true;
  renderer.vr.setReferenceSpaceType('local-floor');
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xffffff, 0x252535, 1.0));
  var light = new THREE.DirectionalLight(0xffffff, 0.75);
  light.position.set(2, 6, 3);
  scene.add(light);

  var floor = new THREE.Mesh(
    new THREE.PlaneBufferGeometry(16, 16),
    new THREE.MeshLambertMaterial({color:0x171720})
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  var HOOP_Z = -3.2;
  var HOOP_Y = 2.55;
  var HOOP_RADIUS = 0.30;

  var hoop = new THREE.Group();
  hoop.position.z = HOOP_Z;
  scene.add(hoop);

  var board = new THREE.Mesh(
    new THREE.BoxBufferGeometry(1.25, 0.82, 0.05),
    new THREE.MeshLambertMaterial({color:0xffffff, transparent:true, opacity:0.32})
  );
  board.position.set(0, HOOP_Y + 0.35, -0.35);
  hoop.add(board);

  var rim = new THREE.Mesh(
    new THREE.TorusBufferGeometry(HOOP_RADIUS, 0.025, 10, 28),
    new THREE.MeshLambertMaterial({color:0xff6a00})
  );
  rim.rotation.x = Math.PI / 2;
  rim.position.y = HOOP_Y;
  hoop.add(rim);

  var pole = new THREE.Mesh(
    new THREE.CylinderBufferGeometry(0.055, 0.055, HOOP_Y + 0.8, 8),
    new THREE.MeshLambertMaterial({color:0x44444e})
  );
  pole.position.set(0, (HOOP_Y + 0.8) / 2, -0.62);
  hoop.add(pole);

  var net = new THREE.Mesh(
    new THREE.ConeBufferGeometry(HOOP_RADIUS * 0.92, 0.35, 10, 1, true),
    new THREE.MeshBasicMaterial({color:0xffffff, wireframe:true, transparent:true, opacity:0.45})
  );
  net.position.set(0, HOOP_Y - 0.18, 0);
  hoop.add(net);

  var BALL_RADIUS = 0.12;
  var ballMat = new THREE.MeshLambertMaterial({color:0xff7518, emissive:0x000000});
  var ball = new THREE.Mesh(new THREE.SphereBufferGeometry(BALL_RADIUS, 16, 12), ballMat);
  scene.add(ball);

  var diagnostic = new THREE.Mesh(
    new THREE.PlaneBufferGeometry(0.5, 0.22),
    new THREE.MeshBasicMaterial({color:0x0000ff, side:THREE.DoubleSide})
  );
  diagnostic.position.set(0, 1.9, -1.2);
  scene.add(diagnostic);

  var controller0 = new THREE.Group();
  var controller1 = new THREE.Group();
  scene.add(controller0);
  scene.add(controller1);

  function addControllerVisual(controller){
    var marker = new THREE.Mesh(
      new THREE.SphereBufferGeometry(0.045, 10, 8),
      new THREE.MeshBasicMaterial({color:0xff2948})
    );
    controller.add(marker);
    var rayGeo = new THREE.BufferGeometry();
    rayGeo.addAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,-1], 3));
    var ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.55}));
    ray.scale.z = 0.7;
    controller.add(ray);
  }
  addControllerVisual(controller0);
  addControllerVisual(controller1);

  var controllers = [controller0, controller1];
  var previousPressed = [false, false];
  var controllerGamepads = [null, null];
  var vrDisplay = null;
  var startingVR = false;
  var clock = new THREE.Clock();
  var history = [];
  var state = {
    held:false,
    controller:null,
    flying:false,
    velocity:new THREE.Vector3(),
    scored:false,
    crossed:false,
    makes:0,
    misses:0,
    streak:0
  };

  function updateHud(){
    document.getElementById('makes').textContent = state.makes;
    document.getElementById('misses').textContent = state.misses;
    document.getElementById('streak').textContent = state.streak;
  }

  function resetBall(){
    state.held = false;
    state.controller = null;
    state.flying = false;
    state.velocity.set(0,0,0);
    state.scored = false;
    state.crossed = false;
    history.length = 0;
    ball.position.set(0, 1.12, -0.55);
  }
  resetBall();

  function getRawGamepads(){
    var result = [];
    var pads = navigator.getGamepads ? navigator.getGamepads() : [];
    var i, gp;
    for (i = 0; i < pads.length; i++) {
      gp = pads[i];
      if (!gp) continue;
      if (gp.pose || gp.hand || gp.displayId !== undefined) result.push(gp);
    }
    return result;
  }

  function buttonIsPressed(gamepad){
    if (!gamepad || !gamepad.buttons) return false;
    var preferred = [1, 0, 2, 3];
    var i, index, button;
    for (i = 0; i < preferred.length; i++) {
      index = preferred[i];
      button = gamepad.buttons[index];
      if (button && (button.pressed || button.value > 0.55)) return true;
    }
    for (i = 0; i < gamepad.buttons.length; i++) {
      button = gamepad.buttons[i];
      if (button && (button.pressed || button.value > 0.75)) return true;
    }
    return false;
  }

  var headPos = new THREE.Vector3();
  var headQuat = new THREE.Quaternion();
  var tempOffset = new THREE.Vector3();
  var tempQuat = new THREE.Quaternion();
  var tempPos = new THREE.Vector3();

  function updateControllerPose(controller, gamepad, index){
    if (!gamepad || !gamepad.pose) {
      controller.visible = false;
      return;
    }

    var pose = gamepad.pose;
    controller.visible = true;

    if (pose.orientation) {
      controller.quaternion.fromArray(pose.orientation);
    }

    if (pose.position && pose.hasPosition !== false) {
      controller.position.fromArray(pose.position);
      if (renderer.vr && renderer.vr.getStandingMatrix) {
        controller.position.applyMatrix4(renderer.vr.getStandingMatrix());
      }
    } else {
      camera.getWorldPosition(headPos);
      camera.getWorldQuaternion(headQuat);
      tempOffset.set(index === 0 ? 0.24 : -0.24, -0.32, -0.42).applyQuaternion(headQuat);
      controller.position.copy(headPos).add(tempOffset);
    }

    controller.updateMatrix();
    controller.updateMatrixWorld(true);
  }

  function grab(controller){
    if (state.held || state.flying || !controller.visible) return;
    state.held = true;
    state.controller = controller;
    state.scored = false;
    state.crossed = false;
    history.length = 0;
    diagnostic.material.color.setHex(0xffffff);
  }

  function release(controller){
    if (!state.held || state.controller !== controller) return;

    var velocity = new THREE.Vector3();
    if (history.length >= 2) {
      var first = history[0];
      var last = history[history.length - 1];
      var seconds = (last.t - first.t) / 1000;
      if (seconds > 0.01) velocity.subVectors(last.p, first.p).divideScalar(seconds);
    }

    if (velocity.length() < 1.0) {
      controller.getWorldQuaternion(tempQuat);
      velocity.set(0, 0, -1).applyQuaternion(tempQuat).normalize();
      velocity.y = Math.max(velocity.y, 0.17);
      velocity.normalize().multiplyScalar(5.8);
      velocity.y += 1.5;
    }

    state.velocity.copy(velocity);
    state.held = false;
    state.controller = null;
    state.flying = true;
    state.scored = false;
    state.crossed = false;
    history.length = 0;
  }

  function updateInputs(){
    var pads = getRawGamepads();
    var i, pressed;

    diagnostic.material.color.setHex(pads.length ? 0xff2948 : 0x0000ff);

    for (i = 0; i < 2; i++) {
      controllerGamepads[i] = pads[i] || null;
      updateControllerPose(controllers[i], controllerGamepads[i], i);
      pressed = buttonIsPressed(controllerGamepads[i]);

      if (pressed && !previousPressed[i]) grab(controllers[i]);
      if (!pressed && previousPressed[i]) release(controllers[i]);
      previousPressed[i] = pressed;
    }
  }

  function updateGame(delta){
    if (state.held && state.controller) {
      state.controller.getWorldPosition(tempPos);
      state.controller.getWorldQuaternion(tempQuat);
      tempOffset.set(0, 0, -0.38).applyQuaternion(tempQuat);
      ball.position.copy(tempPos).add(tempOffset);
      history.push({p:tempPos.clone(), t:performance.now()});
      if (history.length > 5) history.shift();
    } else if (state.flying) {
      state.velocity.y -= 9.8 * delta;
      ball.position.addScaledVector(state.velocity, delta);

      var dx = ball.position.x;
      var dz = ball.position.z - HOOP_Z;
      var horizontalDistance = Math.sqrt(dx * dx + dz * dz);

      if (!state.crossed && state.velocity.y < 0 && ball.position.y <= HOOP_Y && ball.position.y > HOOP_Y - 0.26) {
        state.crossed = true;
        if (horizontalDistance < HOOP_RADIUS * 0.80) {
          state.scored = true;
          state.makes++;
          state.streak++;
          updateHud();
        }
      }

      if (ball.position.y < 0.05 || ball.position.length() > 14) {
        if (!state.scored) {
          state.misses++;
          state.streak = 0;
          updateHud();
        }
        resetBall();
      }
    }
  }

  function render(){
    var delta = Math.min(clock.getDelta(), 0.05);
    updateInputs();
    updateGame(delta);
    renderer.render(scene, camera);
  }
  renderer.setAnimationLoop(render);

  function findDisplay(){
    if (!navigator.getVRDisplays) return Promise.reject(new Error('WebVR API is unavailable.'));
    return navigator.getVRDisplays().then(function(displays){
      if (!displays || displays.length === 0) throw new Error('No VR display was found by Firefox Reality.');
      vrDisplay = displays[0];
      renderer.vr.setDevice(vrDisplay);
      statusEl.textContent = 'PICO detected. Press ENTER VR, then hold the controller trigger, aim, and release.';
      showError('');
      return vrDisplay;
    });
  }

  function enterVR(event){
    if (event) {
      if (event.preventDefault) event.preventDefault();
      if (event.stopPropagation) event.stopPropagation();
    }

    if (startingVR || (vrDisplay && vrDisplay.isPresenting)) return;
    startingVR = true;
    statusEl.textContent = 'Starting native WebVR…';
    enterBtn.textContent = 'STARTING…';
    showError('');

    var ready = vrDisplay ? Promise.resolve(vrDisplay) : findDisplay();
    ready.then(function(display){
      return display.requestPresent([{source:renderer.domElement}]);
    }).then(function(){
      startingVR = false;
      overlay.style.display = 'none';
      enterBtn.textContent = 'ENTER VR';
    }).catch(function(error){
      startingVR = false;
      enterBtn.textContent = 'ENTER VR';
      statusEl.textContent = 'VR did not start.';
      showError(error && error.message ? error.message : String(error));
    });
  }

  enterBtn.onclick = enterVR;
  enterBtn.addEventListener('pointerup', function(event){
    if (event.pointerType) enterVR(event);
  }, false);
  enterBtn.addEventListener('touchend', enterVR, false);

  window.addEventListener('vrdisplaypresentchange', function(){
    if (vrDisplay && vrDisplay.isPresenting) {
      startingVR = false;
      overlay.style.display = 'none';
    } else {
      overlay.style.display = 'flex';
      statusEl.textContent = 'VR session ended. Press ENTER VR to return.';
    }
  }, false);

  window.addEventListener('vrdisplayactivate', function(event){
    vrDisplay = event.display || vrDisplay;
    if (vrDisplay) {
      renderer.vr.setDevice(vrDisplay);
      vrDisplay.requestPresent([{source:renderer.domElement}]).catch(function(error){
        showError(error && error.message ? error.message : String(error));
      });
    }
  }, false);

  window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }, false);

  findDisplay().catch(function(error){
    statusEl.textContent = 'The original PICO VR display was not detected.';
    showError(error && error.message ? error.message : String(error));
  });
})();
</script>
</body>
</html>
