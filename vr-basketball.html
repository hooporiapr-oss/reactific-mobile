<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VR Basketball Prototype | Ritnome</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden}
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#180000 0%,#000 70%);z-index:10;text-align:center;padding:24px;
}
.logo{font-size:2rem;font-weight:900;font-style:italic;letter-spacing:.08em;text-transform:uppercase;color:#fff;text-shadow:0 0 40px rgba(255,30,60,.8);margin-bottom:8px}
.logo span{color:#ff1e3c}
.sub{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:#ff6b7f;margin-bottom:24px}
#enterBtn{padding:16px 34px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff1e3c,#ff6b7f);color:#fff;font-size:1.05rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 30px rgba(255,30,60,.6)}
#enterBtn:disabled{opacity:.4;cursor:not-allowed}
#status{margin-top:16px;font-size:.7rem;color:#8892a0;letter-spacing:.05em;max-width:340px;line-height:1.6}
#hud{
  position:fixed;top:16px;left:0;right:0;display:none;justify-content:center;gap:10px;z-index:5;pointer-events:none;
}
.hud-box{background:rgba(0,0,0,.6);border:1px solid rgba(255,30,60,.4);border-radius:10px;padding:6px 16px;text-align:center}
.hud-label{font-size:.55rem;color:#ff1e3c;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.hud-val{font-size:1.2rem;font-weight:900;color:#fff}
canvas{display:block}
</style>
</head>
<body>

<div id="overlay">
  <div class="logo">VR <span>BASKETBALL</span></div>
  <div class="sub">Prototype · Real Shot Physics</div>
  <button id="enterBtn" disabled>Checking WebXR…</button>
  <div id="status">Checking this headset for WebXR or legacy WebVR support…</div>
</div>

<div id="hud">
  <div class="hud-box"><div class="hud-label">Makes</div><div class="hud-val" id="hMakes">0</div></div>
  <div class="hud-box"><div class="hud-label">Misses</div><div class="hud-val" id="hMisses">0</div></div>
  <div class="hud-box"><div class="hud-label">Streak</div><div class="hud-val" id="hStreak">0</div></div>
</div>

<div id="debugHud" style="display:none;position:fixed;bottom:10px;left:0;right:0;text-align:center;z-index:5;pointer-events:none;font-size:.65rem;color:#0f0;background:rgba(0,0,0,.7);padding:8px;line-height:1.6">
  <div id="dbgTrigger">Trigger presses detected: 0</div>
  <div id="dbgRaw">Raw input sources: --</div>
  <div id="dbgDist">Distance to ball: --</div>
  <div id="dbgGrip">Grip pos: --</div>
  <div id="dbgBall">Ball pos: --</div>
</div>

<!-- Legacy bridge: exposes a WebXR-style API on browsers that only implement WebVR 1.1. -->
<script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@2.0.3/build/webxr-polyfill.min.js"></script>
<script>
window.__PICO_LEGACY_WEBVR__ = !navigator.xr && !!navigator.getVRDisplays;
if (!navigator.xr && window.WebXRPolyfill) {
  try {
    window.__webXRPolyfill = new WebXRPolyfill({ webvr: true, cardboard: false });
  } catch (e) {
    console.error('WebXR polyfill failed:', e);
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
var $ = id => document.getElementById(id);

// ---------- WebXR / legacy WebVR availability check ----------
var legacyWebVR = !!window.__PICO_LEGACY_WEBVR__;
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(function(supported){
    if (supported) {
      $('enterBtn').disabled = false;
      $('enterBtn').textContent = '🏀 Enter VR';
      $('status').textContent = legacyWebVR
        ? 'Legacy PICO mode: press and hold the controller trigger, aim, then release to shoot.'
        : 'Hold the controller trigger near the ball, pull back, and release to shoot.';
    } else {
      $('status').textContent = 'The browser is present, but immersive VR was rejected by this headset.';
    }
  }).catch(function(err){
    $('status').textContent = 'Could not check VR support: ' + (err && err.message ? err.message : err);
  });
} else if (navigator.getVRDisplays) {
  $('status').textContent = 'Legacy WebVR was detected, but the WebXR compatibility bridge did not load.';
} else {
  $('status').textContent = 'This browser exposes neither WebXR nor legacy WebVR.';
}

// ---------- Three.js scene ----------
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
scene.fog = new THREE.Fog(0x0a0a12, 8, 30);

var camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 100);
camera.position.set(0, 1.6, 0.6); // sensible eye-height default before VR session starts (VR overrides this per-frame automatically)

var renderer = new THREE.WebGLRenderer({ antialias: !legacyWebVR });
// Older standalone PICO GPUs can stall when rendering at the headset's full device pixel ratio.
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, legacyWebVR ? 1 : 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
scene.add(new THREE.HemisphereLight(0xffffff, 0x222233, 0.9));
var dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
dirLight.position.set(3, 8, 4);
dirLight.castShadow = true;
scene.add(dirLight);

// Floor
var floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x161620, roughness: 0.95 })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Court markings (simple ring under the hoop, cosmetic)
var courtRing = new THREE.Mesh(
  new THREE.RingGeometry(1.6, 1.7, 48),
  new THREE.MeshBasicMaterial({ color: 0xff1e3c, side: THREE.DoubleSide, transparent:true, opacity:0.5 })
);
courtRing.rotation.x = -Math.PI/2;
courtRing.position.set(0, 0.01, -3.2);
scene.add(courtRing);

// ---------- Hoop ----------
var HOOP_HEIGHT = 2.6;      // rim height (meters) — real hoop is 3.05m, lowered for a comfortable room-scale prototype
var HOOP_DIST   = -3.2;     // distance in front of player start
var HOOP_RADIUS = 0.28;

var hoopGroup = new THREE.Group();
hoopGroup.position.set(0, 0, HOOP_DIST);
scene.add(hoopGroup);

// Backboard
var backboard = new THREE.Mesh(
  new THREE.BoxGeometry(1.2, 0.8, 0.05),
  new THREE.MeshStandardMaterial({ color: 0xffffff, transparent:true, opacity:0.25 })
);
backboard.position.set(0, HOOP_HEIGHT + 0.35, -0.35);
hoopGroup.add(backboard);

// Rim (torus)
var rim = new THREE.Mesh(
  new THREE.TorusGeometry(HOOP_RADIUS, 0.02, 12, 32),
  new THREE.MeshStandardMaterial({ color: 0xff6600, metalness:0.3, roughness:0.5 })
);
rim.rotation.x = Math.PI/2;
rim.position.set(0, HOOP_HEIGHT, 0);
hoopGroup.add(rim);

// Net (simple visual cue, cosmetic wireframe cone)
var net = new THREE.Mesh(
  new THREE.ConeGeometry(HOOP_RADIUS*0.95, 0.35, 12, 1, true),
  new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe:true, transparent:true, opacity:0.5 })
);
net.position.set(0, HOOP_HEIGHT - 0.18, 0);
hoopGroup.add(net);

// Pole
var pole = new THREE.Mesh(
  new THREE.CylinderGeometry(0.05, 0.05, HOOP_HEIGHT + 0.8, 8),
  new THREE.MeshStandardMaterial({ color: 0x333340 })
);
pole.position.set(0, (HOOP_HEIGHT + 0.8)/2, -0.6);
hoopGroup.add(pole);

// ---------- Ball ----------
var BALL_RADIUS = 0.12;
var ballMat = new THREE.MeshStandardMaterial({ color: 0xff7518, roughness:0.7 });
var ball = new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS, 24, 24), ballMat);
ball.castShadow = true;

// ---------- IN-SCENE diagnostic panel (HTML overlays are NOT visible inside a VR headset — this is) ----------
// Floats in front of the player. RED = idle. Flashes BRIGHT WHITE the instant ANY raw trigger press is detected.
var diagPanel = new THREE.Mesh(
  new THREE.PlaneGeometry(0.6, 0.3),
  new THREE.MeshBasicMaterial({ color: 0xff1e3c, side: THREE.DoubleSide })
);
diagPanel.position.set(0, 1.9, -1.2);
scene.add(diagPanel);
var diagFlashUntil = 0;
function flashDiagPanel(){
  diagPanel.material.color.set(0xffffff);
  diagFlashUntil = performance.now() + 400;
}
scene.add(ball);

// Ball seam lines (cosmetic)
var seamMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a });
[0, Math.PI/2].forEach(function(rotY){
  var pts = [];
  for (var a=0;a<=Math.PI*2+0.01;a+=0.1) pts.push(new THREE.Vector3(Math.sin(a)*BALL_RADIUS*1.01, Math.cos(a)*BALL_RADIUS*1.01, 0));
  var geo = new THREE.BufferGeometry().setFromPoints(pts);
  var line = new THREE.Line(geo, seamMat);
  line.rotation.y = rotY;
  ball.add(line);
});

// ---------- Game state ----------
var HAND_OFFSET = new THREE.Vector3(0, 0, -0.12); // ball sits slightly in front of controller
var SPAWN_LOCAL = new THREE.Vector3(0, 1.1, -0.4);  // relative to player rig, where ball resets to (negative Z = in front, matching hoop direction)

var state = {
  held: false,
  controller: null,
  flying: false,
  velocity: new THREE.Vector3(),
  scoredThisShot: false,
  passedThroughPlane: false,
  makes: 0,
  misses: 0,
  streak: 0
};

var GRAVITY = -9.8;
var posHistory = []; // last few frames of controller world position, for velocity-at-release calc
var MAX_HISTORY = 4;

function resetBall(){
  state.flying = false;
  state.held = false;
  state.controller = null;
  state.grip = null;
  state.scoredThisShot = false;
  state.passedThroughPlane = false;
  state.legacyAimGrab = false;
  state.velocity.set(0,0,0);
  posHistory = [];
  // place near player's default hand height in front of them
  ball.position.set(0, 1.1, -0.4);
}
resetBall();

function vibrate(inputSource, intensity, durationMs){
  try{
    var gp = inputSource && inputSource.gamepad;
    if (gp && gp.hapticActuators && gp.hapticActuators[0]) {
      gp.hapticActuators[0].pulse(intensity, durationMs);
    } else if (gp && gp.vibrationActuator) {
      gp.vibrationActuator.playEffect('dual-rumble', { duration: durationMs, strongMagnitude: intensity, weakMagnitude: intensity });
    }
  }catch(e){}
}

var audioCtx = null;
function getAC(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(freq, dur, vol, type){
  var c = getAC(); if(!c) return;
  try{
    var o = c.createOscillator(), g = c.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(vol||0.2, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + (dur||0.15));
    o.start(); o.stop(c.currentTime + (dur||0.15) + 0.02);
  }catch(e){}
}
function swishSound(){ [880,1100,1300].forEach(function(f,i){ setTimeout(function(){ tone(f,0.12,0.18) }, i*60) }); }
function missSound(){ tone(200, 0.25, 0.15, 'sawtooth'); }
function grabSound(){ tone(500, 0.06, 0.1); }

function updateHUD(){
  $('hMakes').textContent = state.makes;
  $('hMisses').textContent = state.misses;
  $('hStreak').textContent = state.streak;
}

// ---------- Controller setup ----------
// IMPORTANT: getController() returns the POINTING/aiming ray space, which can be offset
// from where your hand physically is. getControllerGrip() is the actual physical hand/controller
// position — that's what we need for "reach out and grab the ball" to feel right.
var controller0 = renderer.xr.getController(0);
var controller1 = renderer.xr.getController(1);
var grip0 = renderer.xr.getControllerGrip(0);
var grip1 = renderer.xr.getControllerGrip(1);
scene.add(controller0);
scene.add(controller1);
scene.add(grip0);
scene.add(grip1);

// Map each target-ray controller to its matching grip (physical hand position)
var gripFor = new Map();
gripFor.set(controller0, grip0);
gripFor.set(controller1, grip1);

// Some older PICO/WebVR combinations expose a pointing ray but no usable grip pose.
// Use the grip only when Three.js marks it visible; otherwise use the target-ray controller.
function getUsableControllerSpace(controller){
  var grip = gripFor.get(controller);
  return (grip && grip.visible) ? grip : controller;
}
function hasUsableGrip(controller){
  var grip = gripFor.get(controller);
  return !!(grip && grip.visible);
}

// Visual for controllers (small ball-ish marker at the actual grip/hand position)
function makeControllerMesh(){
  var mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.035, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0xff1e3c, emissive:0x330008 })
  );
  return mesh;
}
grip0.add(makeControllerMesh());
grip1.add(makeControllerMesh());

var activeInputSource = null; // XRInputSource currently holding the ball
var GRAB_RADIUS = 0.5; // generous — real-world VR reaching is never pixel-perfect
var debugTriggerCount = 0;

function reportTrigger(source){
  debugTriggerCount++;
  var dbgT = document.getElementById('dbgTrigger');
  if (dbgT) dbgT.textContent = 'Trigger presses detected: ' + debugTriggerCount + ' (via ' + source + ', last: ' + new Date().toLocaleTimeString() + ')';
}

function tryGrab(controller, inputSource){
  if (state.held || state.flying) return;
  var handSpace = getUsableControllerSpace(controller);
  var handPos = new THREE.Vector3();
  handSpace.getWorldPosition(handPos);
  var dist = handPos.distanceTo(ball.position);

  // A 3DoF/legacy controller cannot report a true hand position. In that case,
  // allow trigger-to-grab from anywhere and use the controller aiming ray.
  var legacyAimGrab = legacyWebVR || !hasUsableGrip(controller);
  if (dist < GRAB_RADIUS || legacyAimGrab) {
    state.held = true;
    state.controller = controller;
    state.grip = handSpace;
    state.legacyAimGrab = legacyAimGrab;
    activeInputSource = inputSource;
    posHistory = [];
    grabSound();
    vibrate(inputSource, 0.3, 40);
    ballMat.color.set(0xff7518);
    ballMat.emissive.set(0x000000);
  }
}

function doRelease(controller){
  if (state.held && state.controller === controller) {
    var v = new THREE.Vector3();
    if (posHistory.length >= 2) {
      var a = posHistory[0], b = posHistory[posHistory.length-1];
      var dt = (b.t - a.t) / 1000;
      if (dt > 0) {
        v.subVectors(b.pos, a.pos).divideScalar(dt);
      }
    }

    var speed = v.length();
    // True positional throwing is impossible when the old controller only reports rotation.
    // Use the controller's aiming direction as a playable fallback shot.
    if (speed < 1.0 || state.legacyAimGrab) {
      var worldQ = new THREE.Quaternion();
      controller.getWorldQuaternion(worldQ);
      var aim = new THREE.Vector3(0, 0, -1).applyQuaternion(worldQ).normalize();
      aim.y = Math.max(aim.y, 0.18);
      aim.normalize();
      v.copy(aim).multiplyScalar(5.4);
      v.y += 1.4;
      speed = v.length();
    }

    state.velocity.copy(v);
    state.flying = true;
    state.held = false;
    state.legacyAimGrab = false;
    state.scoredThisShot = false;
    state.passedThroughPlane = false;
    vibrate(activeInputSource, Math.min(1, speed/6), 60);
    activeInputSource = null;
  }
}

// Path B: raw per-frame gamepad button polling (more reliable across imperfect WebXR implementations)
var prevPressed = [false, false];
var controllersByIndex = [controller0, controller1];
var gripsByIndex = [grip0, grip1];

var panelRestColor = 0x0000ff; // starts blue = "no input sources seen yet"

function pollRawGamepadInput(){
  var session = renderer.xr.getSession();
  if (!session) return;
  var sources = session.inputSources;
  var rawInfo = [];

  // Continuously-updated resting color — tells us WHY nothing is registering, at a glance, no press needed:
  //   BLUE   = zero input sources detected at all (controllers not seen by the session)
  //   ORANGE = input sources exist, but none report a gamepad/trigger (e.g. hand-tracking mode, no physical buttons)
  //   RED    = normal — gamepad(s) found, waiting for a press (flashes WHITE on press)
  if (sources.length === 0) {
    panelRestColor = 0x0000ff;
  } else {
    var anyGamepad = false;
    for (var k = 0; k < sources.length; k++) { if (sources[k].gamepad) anyGamepad = true; }
    panelRestColor = anyGamepad ? 0xff1e3c : 0xffa500;
  }

  for (var i = 0; i < sources.length && i < 2; i++) {
    var src = sources[i];
    var hasGamepad = !!src.gamepad;
    var pressed = false;
    var pressedButton = -1;
    // PICO generations do not all map the primary trigger to button 0.
    if (hasGamepad && src.gamepad.buttons) {
      for (var bi = 0; bi < src.gamepad.buttons.length; bi++) {
        if (src.gamepad.buttons[bi] && src.gamepad.buttons[bi].pressed) {
          pressed = true;
          pressedButton = bi;
          break;
        }
      }
    }
    rawInfo.push('src' + i + '[' + (src.handedness||'?') + ']: gamepad=' + hasGamepad + ' pressed=' + pressed + ' button=' + pressedButton);

    if (pressed && !prevPressed[i]) {
      reportTrigger('raw-poll');
      flashDiagPanel();
      tryGrab(controllersByIndex[i], src);
    } else if (!pressed && prevPressed[i]) {
      doRelease(controllersByIndex[i]);
    }
    prevPressed[i] = pressed;
  }
  var dbgRawEl = document.getElementById('dbgRaw');
  if (dbgRawEl) dbgRawEl.textContent = 'Raw input sources (' + sources.length + '): ' + (rawInfo.join(' | ') || 'none detected');
}

// Path A: standard WebXR select events (kept as backup — may not fire on all browsers)
function onSelectStart(event){ reportTrigger('event'); flashDiagPanel(); tryGrab(event.target, event.data); }
function onSelectEnd(event){ doRelease(event.target); }
controller0.addEventListener('selectstart', onSelectStart);
controller0.addEventListener('selectend', onSelectEnd);
controller1.addEventListener('selectstart', onSelectStart);
controller1.addEventListener('selectend', onSelectEnd);

// ---------- Enter VR ----------
$('enterBtn').addEventListener('click', function(){
  // local-floor is optional here because some legacy WebVR bridges reject it as required.
  navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor', 'bounded-floor'] }).then(function(session){
    return renderer.xr.setSession(session).then(function(){
      $('overlay').style.display = 'none';
      $('hud').style.display = 'flex';
      $('debugHud').style.display = 'block';
      session.addEventListener('end', function(){
        $('overlay').style.display = 'flex';
        $('hud').style.display = 'none';
      });
    });
  }).catch(function(err){
    $('status').textContent = 'Failed to start VR session: ' + (err && err.message ? err.message : err);
  });
});

// ---------- Frame loop ----------
var clock = new THREE.Clock();

renderer.setAnimationLoop(function(){
  var dt = Math.min(clock.getDelta(), 0.05);

  pollRawGamepadInput();

  // Panel flash decay — fades back to its diagnostic resting color after a brief flash
  if (performance.now() > diagFlashUntil) {
    diagPanel.material.color.set(panelRestColor);
  }

  // Ball glows bright green when a controller is within grab range — visible proof the distance check is passing
  if (!state.held && !state.flying) {
    var gg0 = new THREE.Vector3(); getUsableControllerSpace(controller0).getWorldPosition(gg0);
    var gg1 = new THREE.Vector3(); getUsableControllerSpace(controller1).getWorldPosition(gg1);
    var inRange = gg0.distanceTo(ball.position) < GRAB_RADIUS || gg1.distanceTo(ball.position) < GRAB_RADIUS;
    ballMat.color.set(inRange ? 0x00ff00 : 0xff7518);
    ballMat.emissive.set(inRange ? 0x004400 : 0x000000);
  }

  // Live debug readout — nearest controller grip distance to ball, updated every frame
  if ($('debugHud') && $('debugHud').style.display !== 'none') {
    var g0 = new THREE.Vector3(); getUsableControllerSpace(controller0).getWorldPosition(g0);
    var g1 = new THREE.Vector3(); getUsableControllerSpace(controller1).getWorldPosition(g1);
    var d0 = g0.distanceTo(ball.position);
    var d1 = g1.distanceTo(ball.position);
    var nearest = Math.min(d0, d1);
    document.getElementById('dbgDist').textContent = 'Distance to ball — grip0: ' + d0.toFixed(2) + 'm, grip1: ' + d1.toFixed(2) + 'm (grab needs < ' + GRAB_RADIUS + 'm)';
    document.getElementById('dbgGrip').textContent = 'Grip0: (' + g0.x.toFixed(2) + ', ' + g0.y.toFixed(2) + ', ' + g0.z.toFixed(2) + ')  Grip1: (' + g1.x.toFixed(2) + ', ' + g1.y.toFixed(2) + ', ' + g1.z.toFixed(2) + ')';
    document.getElementById('dbgBall').textContent = 'Ball pos: (' + ball.position.x.toFixed(2) + ', ' + ball.position.y.toFixed(2) + ', ' + ball.position.z.toFixed(2) + ')  Held: ' + state.held;
  }

  if (state.held && state.grip) {
    var cpos = new THREE.Vector3();
    var cquat = new THREE.Quaternion();
    state.grip.getWorldPosition(cpos);
    state.grip.getWorldQuaternion(cquat);

    var holdDistance = state.legacyAimGrab ? 0.42 : 0.12;
    var offset = new THREE.Vector3(0, 0, -holdDistance).applyQuaternion(cquat);
    ball.position.copy(cpos).add(offset);

    posHistory.push({ pos: cpos.clone(), t: performance.now() });
    if (posHistory.length > MAX_HISTORY) posHistory.shift();
  } else if (state.flying) {
    state.velocity.y += GRAVITY * dt;
    ball.position.addScaledVector(state.velocity, dt);

    // Rim/score detection: check if ball crosses the hoop's horizontal plane, moving downward, within radius
    var localX = ball.position.x - hoopGroup.position.x;
    var localZ = ball.position.z - hoopGroup.position.z;
    var horizDist = Math.sqrt(localX*localX + localZ*localZ);
    var ballY = ball.position.y;

    if (!state.passedThroughPlane && state.velocity.y < 0 && ballY <= HOOP_HEIGHT && ballY > HOOP_HEIGHT - 0.25) {
      state.passedThroughPlane = true;
      if (horizDist < HOOP_RADIUS * 0.85 && !state.scoredThisShot) {
        state.scoredThisShot = true;
        state.makes++; state.streak++;
        updateHUD();
        swishSound();
        if (activeInputSource) vibrate(activeInputSource, 0.6, 100);
        var s = renderer.xr.getSession ? renderer.xr.getSession() : null;
        if (s) { s.inputSources.forEach(function(src){ vibrate(src, 0.6, 100); }); }
      }
    }

    // Ball hit floor or drifted far away -> resolve as miss if not scored, then reset
    if (ball.position.y < 0.05 || ball.position.length() > 15) {
      if (!state.scoredThisShot) {
        state.misses++; state.streak = 0;
        updateHUD();
        missSound();
      }
      resetBall();
    }
  }

  renderer.render(scene, camera);
});

})();
</script>
