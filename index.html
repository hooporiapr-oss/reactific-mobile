<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ritnome · Enter the Arena</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#000;color:#fff;user-select:none;-webkit-user-select:none}

  #strobe{position:fixed;inset:0;z-index:1;pointer-events:none;background:#ff1e3c;opacity:0;transition:opacity .07s ease-out}
  #beat-pulse{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.08;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,30,60,.20) 100%)}
  #dots{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
  .beat-dot{position:absolute;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ff6b7f,#ff1e3c);box-shadow:0 0 34px rgba(255,30,60,.9),0 0 70px rgba(255,30,60,.5);pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.4)}
  @keyframes beatDotFly{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.5)}}

  #center{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
  .kicker{font-size:1rem;font-weight:900;letter-spacing:.5em;text-transform:uppercase;color:#ff1e3c;margin-bottom:14px;text-shadow:0 0 30px rgba(255,30,60,.9);opacity:.95}
  .brand{font-size:4.5rem;font-weight:900;font-style:italic;letter-spacing:.04em;text-transform:uppercase;line-height:.9;color:#fff;text-shadow:0 0 50px rgba(255,30,60,.8),0 0 100px rgba(255,30,60,.4);margin-bottom:8px}
  .sub{font-size:1rem;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:#ff6b7f;margin-bottom:44px}

  .code-panel{width:100%;max-width:360px}
  .code-label{font-size:.72rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:#8892a0;margin-bottom:10px}
  .code-input{width:100%;padding:16px;border-radius:10px;border:2px solid rgba(255,30,60,.4);background:rgba(255,255,255,.06);color:#fff;font-size:1.6rem;font-weight:900;letter-spacing:.3em;text-transform:uppercase;text-align:center;font-family:'Courier New',monospace}
  .code-input:focus{outline:none;border-color:#ff1e3c;box-shadow:0 0 24px rgba(255,30,60,.3)}
  .code-input.shake{animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  .enter-btn{width:100%;margin-top:16px;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff1e3c,#c8102e);color:#fff;font-size:1rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
  .enter-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,30,60,.4)}

  .err{margin-top:14px;color:#ff8888;font-size:.85rem;font-weight:700;letter-spacing:.04em;min-height:18px}

  .brandmark{margin-top:50px;font-size:.75rem;font-weight:900;letter-spacing:.3em;text-transform:uppercase;color:#4a5058}
  .brandmark b{color:#8892a0;font-style:italic}

  #sound-toggle{position:fixed;top:16px;right:16px;z-index:10;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,30,60,.35);background:rgba(255,255,255,.06);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(4px)}
  #sound-toggle:hover{background:rgba(255,30,60,.18);border-color:#ff1e3c}
  #sound-toggle.muted{opacity:.55}

  @media(max-width:480px){ .brand{font-size:3rem} }
</style>
</head>
<body>

<div id="strobe"></div>
<div id="beat-pulse"></div>
<div id="dots"></div>

<button id="sound-toggle" onclick="toggleSound()" aria-label="Toggle sound" title="Toggle beat sound">🔊</button>

<div id="center">
  <div class="kicker">⚡ Reaction Arena</div>
  <div class="brand">RITNOME</div>
  <div class="sub">Pure Reaction · To the Beat</div>

  <div class="code-panel">
    <div class="code-label">Access Code</div>
    <input class="code-input" id="gate-code" maxlength="12" placeholder="• • • •" autocomplete="off" onkeydown="if(event.key==='Enter')tryEnter()">
    <button class="enter-btn" onclick="tryEnter()">Enter the Arena →</button>
    <div class="err" id="gate-err"></div>
  </div>

  <div class="brandmark">Powered by <b>Gostar Digital</b></div>
</div>

<script>
var $=function(id){return document.getElementById(id)};

// ══════════════════════════════════════════════════════
//  LICENSE SYSTEM — codes are checked against Supabase.
//  To issue / expire / revoke licenses, use the Supabase
//  dashboard (Table Editor → licenses). No file edits needed.
// ══════════════════════════════════════════════════════
var SUPABASE_URL = 'https://sdaphocueugzfvjovuxd.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkYXBob2N1ZXVnemZ2am92dXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjQyMDgsImV4cCI6MjA5OTIwMDIwOH0.pDAzf4P6dD9eNEBlnP95SdF5BI-R84-Rdc0vKzYcn7M';
// ══════════════════════════════════════════════════════

function tryEnter(){
  var input = $('gate-code').value.trim();
  if (!input){ return; }
  $('gate-err').style.color = '';
  $('gate-err').textContent = 'Checking…';

  // Query Supabase: does a row exist with this code (case-insensitive), active = true?
  var url = SUPABASE_URL + '/rest/v1/licenses'
    + '?select=code,expires_at,active'
    + '&code=ilike.' + encodeURIComponent(input)
    + '&active=eq.true';

  fetch(url, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    }
  })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    var lic = (rows && rows.length) ? rows[0] : null;

    // not found or inactive
    if (!lic){ return reject('Invalid code — check with your administrator'); }

    // expired?
    if (lic.expires_at){
      var exp = new Date(lic.expires_at + 'T23:59:59');
      if (new Date() > exp){ return reject('This license has expired'); }
    }

    // valid → enter
    sessionStorage.setItem('rct-gate-pass','1');
    sessionStorage.setItem('rct-license', input.toUpperCase());
    window.location.href = '/vr-lab.html';
  })
  .catch(function(){
    reject('Connection problem — please try again');
  });
}

function reject(msg){
  $('gate-err').style.color = '#ff8888';
  $('gate-err').textContent = msg;
  var box = $('gate-code');
  box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
  box.value=''; box.focus();
}

// ── 120 beat: visual (strobe + flying red dots) + audio click ──
var BPM = 120, beatMs = 60000/BPM;
var audioCtx = null, audioReady = false;
var soundOn = true;   // beat audio on by default; user can mute

// Mute/unmute toggle — visual beat always stays; this only affects sound.
function toggleSound(){
  soundOn = !soundOn;
  var btn = $('sound-toggle');
  if (soundOn){
    btn.textContent = '🔊';
    btn.classList.remove('muted');
    initAudio();   // make sure audio is armed if they turn it back on
  } else {
    btn.textContent = '🔇';
    btn.classList.add('muted');
  }
}

// Audio can only start after a user gesture (browser rule).
// We arm it on the first tap/keypress/click anywhere on the page.
function initAudio(){
  if (audioReady) return;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioReady = true;
  }catch(e){}
}
['pointerdown','keydown','touchstart'].forEach(function(evt){
  window.addEventListener(evt, initAudio, { once:false });
});

// The 120 beat "click" — a short, punchy low tone on every beat,
// matching the flying red target that spawns on the same beat.
function beatClick(){
  if(!soundOn || !audioCtx) return;
  try{
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 120;                 // low, felt-in-the-chest pulse
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.14);
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.15);
  }catch(e){}
}

function beatTick(){
  var st=$('strobe'); if(st){st.style.opacity='.10'; setTimeout(function(){st.style.opacity='0'},80)}
  spawnDot();
  beatClick();          // audio fires in sync with the red dot
}
function spawnDot(){
  var layer=$('dots'); if(!layer) return;
  var d=document.createElement('div');
  d.className='beat-dot';
  d.style.left=(8+Math.random()*84)+'%';
  d.style.top=(8+Math.random()*74)+'%';
  var dur=Math.round(beatMs*0.95);
  d.style.animation='beatDotFly '+dur+'ms ease-out forwards';
  layer.appendChild(d);
  setTimeout(function(){ if(d&&d.parentNode) d.parentNode.removeChild(d) }, dur+60);
}
setInterval(beatTick, beatMs);
beatTick();

$('gate-code').focus();
</script>
</body>
</html>
