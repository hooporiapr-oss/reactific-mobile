<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VR Echo Recall | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}

#screen-intro{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  background:radial-gradient(ellipse at center,#0a1400 0%,#000 70%);z-index:100;
  overflow-y:auto;overflow-x:hidden;
  padding:20px 16px 24px;
  box-sizing:border-box;
}
.vrr-logo{font-size:2.4rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1;color:#fff;text-shadow:0 0 60px rgba(154,205,50,1);margin-bottom:8px}
.vrr-logo span{color:#9ACD32}
.vrr-sub{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:#9ACD32;margin-bottom:8px;text-align:center}
.vrr-rule{font-size:.9rem;color:#ffd35a;font-weight:900;letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;text-align:center}
.big-btn{width:100%;max-width:420px;height:68px;border:none;border-radius:20px;background:linear-gradient(135deg,#9ACD32,#B8E050);color:#000;font-size:1.2rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 40px rgba(154,205,50,.7);margin-bottom:14px}
.big-btn:hover{transform:scale(1.03)}
.speed-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;width:100%;max-width:420px}
.speed-btn{width:100%;min-width:0;height:58px;border:3px solid rgba(154,205,50,.4);background:rgba(154,205,50,.08);border-radius:14px;color:#fff;font-size:.9rem;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;padding:4px 2px}
.speed-btn.active{border-color:#9ACD32;background:rgba(154,205,50,.22);box-shadow:0 0 30px rgba(154,205,50,.6);color:#9ACD32}
.speed-btn small{display:block;font-size:.58rem;color:#a7adba;letter-spacing:.02em;white-space:normal;line-height:1.2}
.intro-info{font-size:.75rem;color:#8892a0;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1.8;width:100%;max-width:420px}
.intro-info strong{color:#ffd35a}

@media (max-width:420px){
  #screen-intro{padding:16px 12px 20px}
  .vrr-logo{font-size:1.8rem}
  .vrr-sub{font-size:.62rem;margin-bottom:6px}
  .vrr-rule{font-size:.7rem;margin-bottom:14px}
  .speed-row{gap:5px}
  .speed-btn{height:50px;font-size:.78rem}
  .speed-btn small{font-size:.5rem}
  .big-btn{height:56px;font-size:1rem;margin-bottom:10px}
  .intro-info{font-size:.62rem;line-height:1.6}
}

#screen-game{
  position:fixed;inset:0;display:none;flex-direction:column;
  background:radial-gradient(circle at 16% 5%,rgba(154,205,50,.15),transparent 30%),linear-gradient(180deg,#0a1400,#050a00);
}
.topbar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:10px;padding:6px 10px 4px;flex-shrink:0}
.top-box{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;padding:4px 6px;background:rgba(0,0,0,.4);border:2px solid rgba(154,205,50,.3)}
.top-label{font-size:.5rem;color:#9ACD32;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.top-val{font-size:1.3rem;font-weight:900;line-height:1;color:#fff}
.phase-box{border-color:#ffd35a;background:rgba(255,215,0,.06)!important}
.phase-box .top-label{color:#ffd35a}
.phase-box .top-val{color:#9ACD32;font-size:.9rem;letter-spacing:.05em}
.timerbar{height:6px;background:rgba(255,255,255,.08);flex-shrink:0;overflow:hidden}
.timerbar-fill{height:100%;width:100%;background:#9ACD32;transition:background .3s}
.timerbar-fill.warn{background:#FFD700}
.timerbar-fill.danger{background:#FF1493}
.msg-bar{text-align:center;font-size:1.1rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;min-height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 10px}
.msg-bar.watch{color:#ffd35a}.msg-bar.echo{color:#9ACD32}.msg-bar.go{color:#9ACD32}.msg-bar.perfect{color:#00D9A5}.msg-bar.miss{color:#FF1493}
.stars{display:flex;gap:8px;justify-content:center;align-items:center;flex-shrink:0;padding:2px 0}
.star{font-size:1rem;opacity:.2;transition:all .3s}
.star.earned{opacity:1;filter:drop-shadow(0 0 6px #9ACD32);transform:scale(1.2)}
.court-area{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 8px;min-height:0;perspective:800px}
.court{display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(5,1fr);gap:4px;width:100%;height:100%;max-height:100%;transform:rotateX(6deg);transform-origin:center bottom;border:2px solid rgba(154,205,50,.25);border-radius:14px;padding:6px;background:rgba(5,10,0,.85);box-shadow:0 0 60px rgba(154,205,50,.3),inset 0 0 40px rgba(154,205,50,.04),0 20px 60px rgba(0,0,0,.8)}
.cell{border-radius:8px;background:rgba(154,205,50,.08);border:2px solid rgba(154,205,50,.4);display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,2.2vw,2rem);font-weight:900;color:transparent;cursor:pointer;transition:all .08s;min-height:0;min-width:0;touch-action:manipulation}
.cell:hover{background:rgba(154,205,50,.2);border-color:#9ACD32;transform:scale(1.05)}
.cell.lit{background:#FFD700!important;border-color:#FFD700!important;box-shadow:0 0 30px rgba(255,215,0,1)!important;color:#000!important;transform:scale(1.06)}
.cell.echo-lit{background:#9ACD32!important;border-color:#B8E050!important;box-shadow:0 0 30px rgba(154,205,50,1)!important;color:#000!important;transform:scale(1.06)}
.cell.find-target{border-color:#9ACD32!important;background:rgba(154,205,50,.18)!important;color:#9ACD32!important}
.cell.correct{background:#00D9A5!important;border-color:#00D9A5!important;box-shadow:0 0 20px rgba(0,217,165,.8)!important;color:#000!important}
.cell.wrong{background:rgba(255,20,147,.35)!important;border-color:#FF1493!important;animation:shake .3s;color:#fff!important}
.cell.reveal-answer{border:3px solid #00D9A5!important;background:rgba(0,217,165,.2)!important;color:#00D9A5!important}
.cell.reveal-original{border:3px dashed #FFD700!important;background:rgba(255,215,0,.15)!important;color:#FFD700!important}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.bottombar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:4px 10px 6px;gap:8px;flex-shrink:0}
.bot-btn{height:48px;border:2px solid rgba(154,205,50,.5);background:rgba(0,0,0,.4);border-radius:12px;color:#fff;font-size:1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.bot-btn span{display:block;color:#9ACD32;font-size:.55rem;margin-top:1px}
.start-btn{border-color:#9ACD32;background:linear-gradient(180deg,#B8E050,#9ACD32);color:#000;font-size:1.1rem;box-shadow:0 0 18px rgba(154,205,50,.7)}
.start-btn:disabled{opacity:.5}

@media (max-width:768px){
  .bottombar{grid-template-columns:1fr 1fr 1fr}
  #fsBtn{display:none}
}
</style>
</head>
<body>

<div id="screen-intro">
  <a style="display:inline-block;margin-bottom:18px;padding:10px 20px;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:#fff;font-size:.85rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;cursor:pointer;text-decoration:none;align-self:flex-start" href="/vr-home.html">← Games</a>
  <div class="vrr-logo">ECHO <span>RECALL</span></div>
  <div class="vrr-sub">5×10 VR Court · Reactific™</div>
  <div class="vrr-rule">👁️ WATCH · ECHO · SPOT THE CHANGE</div>
  <div class="speed-row">
    <button class="speed-btn active" data-iv="1000">SLOW<small>60 BPM</small></button>
    <button class="speed-btn" data-iv="667">TEMPO<small>90 BPM</small></button>
    <button class="speed-btn" data-iv="500">ELITE<small>120 BPM</small></button>
  </div>
  <button class="big-btn" id="startBtn">👁️ ENTER THE COURT</button>
  <div class="intro-info">
    <strong>WATCH</strong> — original pattern flashes gold<br>
    <strong>ECHO</strong> — same pattern in lime — ONE cell changed<br>
    <strong>TAP</strong> — the cell that is different<br>
    <strong>2 PERFECT</strong> — level up
  </div>
</div>

<div id="screen-game">
  <div class="topbar">
    <div class="top-box"><div class="top-label">Score</div><div class="top-val" id="hSc">0</div></div>
    <div class="top-box phase-box"><div class="top-label">Phase</div><div class="top-val" id="hPhase">READY</div></div>
    <div class="top-box"><div class="top-label">Round</div><div class="top-val" id="hRd">0</div></div>
    <div class="top-box"><div class="top-label">Level</div><div class="top-val" id="hLv">1</div></div>
    <div class="top-box"><div class="top-label">Streak</div><div class="top-val" id="hSt">0</div></div>
    <div class="top-box"><div class="top-label">Perfect</div><div class="top-val" id="hPf">0/2</div></div>
  </div>
  <div class="timerbar"><div class="timerbar-fill" id="timerFill" style="width:100%"></div></div>
  <div class="msg-bar watch" id="msg">TAP LET'S GO!</div>
  <div class="stars"><span style="font-size:.65rem;color:#8892a0;letter-spacing:.1em;text-transform:uppercase">Level</span>&nbsp;<span id="ps1" style="font-size:1.2rem;font-weight:900;color:#9ACD32"></span></div>
  <div class="court-area"><div class="court" id="court"></div></div>
  <div class="bottombar">
    <button class="bot-btn" id="menuBtn">← Home<span>Settings</span></button>
    <button class="bot-btn start-btn" id="actBtn">LET'S GO</button>
    <button class="bot-btn" id="restartBtn" style="display:none;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);color:#8892a0;font-size:.8rem" onclick="restartGame()">↺ Restart<span style="color:#555">Level 1</span></button>
    <button class="bot-btn" id="fsBtn">Fullscreen<span>Toggle</span></button>
  </div>
</div>

<script>
(function(){
var $=id=>document.getElementById(id);
var beatIv=1000;

document.querySelectorAll('[data-iv]').forEach(btn=>{btn.onclick=function(){beatIv=Number(btn.dataset.iv);document.querySelectorAll('[data-iv]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}});

var timerRAF=null,timerStart=0,timerDur=0,canTap=false;
function startTimer(dur){timerDur=dur;timerStart=performance.now();$('timerFill').style.width='100%';$('timerFill').className='timerbar-fill';function tick(){var pct=Math.max(0,1-(performance.now()-timerStart)/timerDur);$('timerFill').style.width=(pct*100)+'%';if(pct<0.3)$('timerFill').className='timerbar-fill danger';else if(pct<0.5)$('timerFill').className='timerbar-fill warn';if(pct>0&&canTap)timerRAF=requestAnimationFrame(tick)}timerRAF=requestAnimationFrame(tick)}
function stopTimer(){if(timerRAF)cancelAnimationFrame(timerRAF);timerRAF=null;$('timerFill').style.width='100%';$('timerFill').className='timerbar-fill'}

$('startBtn').onclick=function(){$('screen-intro').style.display='none';$('screen-game').style.display='flex';buildCourt();initGame()};
$('menuBtn').onclick=function(){stopTimer();$('screen-game').style.display='none';$('screen-intro').style.display='flex'};
$('fsBtn').onclick=async function(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){}};

var cells=[];
function buildCourt(){var court=$('court');court.innerHTML='';cells=[];for(var i=0;i<50;i++){var c=document.createElement('div');c.className='cell';c.dataset.i=i;c.addEventListener('pointerdown',(function(idx){return function(e){e.preventDefault();handleTap(idx)}})(i));court.appendChild(c);cells.push(c)}}
function cellSt(i,st,num){cells[i].className='cell';cells[i].textContent='';cells[i].style.color='transparent';if(st){cells[i].classList.add(st);if(num!==undefined){cells[i].textContent=num;cells[i].style.color=''}}}
function resetCells(){cells.forEach((_,i)=>cellSt(i))}

function gcc(lv){return(lv||1)+2}
var g={lv:1,sc:0,rd:0,st:0,pf:0};
function updateHUD(){$('hSc').textContent=g.sc;$('hRd').textContent=g.rd;$('hLv').textContent=g.lv;$('hSt').textContent=g.st;$('hPf').textContent=g.pf+'/2';$('ps1').textContent=g.lv}
function setPhase(txt){$('hPhase').textContent=txt}
function msg(txt,cls){var el=$('msg');el.textContent=txt;el.className='msg-bar '+(cls||'watch')}
function initGame(){g={lv:1,sc:0,rd:0,st:0,pf:0};updateHUD();setPhase('READY');msg("TAP LET'S GO!",'watch');$('actBtn').textContent="LET'S GO";$('actBtn').disabled=false;$('actBtn').onclick=startRound;$('restartBtn').style.display='none';stopTimer()}

// ── SCORE SUBMISSION ──────────────────────────────────
var API='https://api.reactificgaming.com';
(function(){
  var urlToken=new URLSearchParams(window.location.search).get('t');
  if(urlToken)localStorage.setItem('rct-token',urlToken);
})();

function submitScore(score,level,mode){
  var token=localStorage.getItem('rct-token');
  if(!token)return;
  fetch(API+'/api/scores/game',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({game_id:'recovery',score:score,level:level,mode:mode})
  }).catch(function(err){
    console.error('Score submit error:',err);
  });
}

// Ensure score is saved when leaving
window.addEventListener('beforeunload',function(){
  var token=localStorage.getItem('rct-token');
  if(token && g && g.sc>0){
    navigator.sendBeacon(API+'/api/scores/game',
      JSON.stringify({game_id:'recovery',score:g.sc,level:g.lv,mode:'progression'})
    );
  }
});

var phase='idle',original=[],echo=[],changedCell=-1,originalCell=-1,changePos=-1,timers=[];
function clrT(){timers.forEach(clearTimeout);timers=[]}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}

function genPatterns(){
  var len=gcc(g.lv);
  var indices=shuffle(Array.from({length:50},(_,i)=>i)).slice(0,len);
  original=indices.slice();echo=indices.slice();
  changePos=Math.floor(Math.random()*len);
  originalCell=indices[changePos];
  var used=indices.slice(),newCell;
  do{newCell=Math.floor(Math.random()*50)}while(used.indexOf(newCell)!==-1);
  echo[changePos]=newCell;changedCell=newCell;
}

function startRound(){
  if(phase!=='idle')return;
  clrT();canTap=false;stopTimer();
  phase='watching';g.rd++;genPatterns();
  resetCells();$('actBtn').disabled=true;$('restartBtn').style.display='none';updateHUD();
  setPhase('WATCH');msg('WATCH ORIGINAL','watch');
  var i=0;
  function watchNext(){
    if(phase!=='watching')return;
    if(i>0)cellSt(original[i-1]);
    if(i<original.length){cellSt(original[i],'lit',i+1);i++;timers.push(setTimeout(watchNext,beatIv))}
    else{timers.push(setTimeout(function(){cellSt(original[original.length-1]);startEcho()},beatIv*.6))}
  }
  timers.push(setTimeout(watchNext,500));
}

function startEcho(){
  phase='echoing';resetCells();setPhase('ECHO');msg('NOW THE ECHO...','echo');
  var i=0;
  function echoNext(){
    if(phase!=='echoing')return;
    if(i>0)cellSt(echo[i-1]);
    if(i<echo.length){cellSt(echo[i],'echo-lit',i+1);i++;timers.push(setTimeout(echoNext,beatIv))}
    else{timers.push(setTimeout(function(){cellSt(echo[echo.length-1]);startFind()},beatIv*.6))}
  }
  timers.push(setTimeout(echoNext,400));
}

function startFind(){
  phase='finding';canTap=true;resetCells();
  echo.forEach(function(idx,n){cellSt(idx,'find-target',n+1)});
  setPhase('TAP IT');msg('TAP THE CHANGE!','go');
  var dur=beatIv*4;startTimer(dur);
  timers.push(setTimeout(function(){
    if(phase!=='finding')return;
    canTap=false;stopTimer();setPhase('TIME');msg("TIME'S UP!",'miss');
    revealAnswer();timers.push(setTimeout(roundFail,1500));
  },dur));
}

function handleTap(idx){
  if(phase!=='finding'||!canTap)return;
  if(echo.indexOf(idx)===-1)return;
  canTap=false;stopTimer();clrT();
  if(idx===changedCell){
    cellSt(idx,'correct',changePos+1);
    echo.forEach(function(ci){if(ci!==idx)cellSt(ci)});
    timers.push(setTimeout(function(){cellSt(originalCell,'reveal-original',changePos+1)},300));
    timers.push(setTimeout(roundSuccess,700));
  }else{
    cellSt(idx,'wrong');
    timers.push(setTimeout(function(){revealAnswer()},400));
    timers.push(setTimeout(roundFail,1800));
  }
}

function revealAnswer(){echo.forEach(function(ci){cellSt(ci)});cellSt(changedCell,'reveal-answer',changePos+1);cellSt(originalCell,'reveal-original',changePos+1)}

function roundSuccess(){
  phase='idle';g.pf++;g.st++;g.sc+=20*g.lv;updateHUD();setPhase('✅');msg('CORRECT!','perfect');
  if(g.pf>=2){
    timers.push(setTimeout(function(){
      if(g.lv<10){
        g.lv++;
        g.pf=0;
        submitScore(g.sc,g.lv,'progression');  // FIXED: Submit on level up
      }
      updateHUD();
      resetCells();
      msg('LEVEL UP! L'+g.lv,'perfect');
      timers.push(setTimeout(autoNextRound,900))
    },1200))
  }else{
    submitScore(g.sc,g.lv,'progression');  // FIXED: Submit on regular success
    timers.push(setTimeout(autoNextRound,1000))
  }
}

function autoNextRound(){if(phase!=='idle')return;resetCells();stopTimer();$('restartBtn').style.display='none';startRound()}

function roundFail(){
  phase='idle';g.st=0;g.pf=0;updateHUD();setPhase('❌');msg('WRONG!','miss');
  submitScore(g.sc,g.lv,'progression');
  timers.push(setTimeout(showMissOptions,1200));
}

function showMissOptions(){phase='idle';canTap=false;clrT();stopTimer();resetCells();updateHUD();setPhase('READY');
  msg("TRY AGAIN",'miss');
  $('actBtn').textContent="TRY AGAIN";$('actBtn').onclick=function(){$('restartBtn').style.display='none';startRound()};$('actBtn').disabled=false;
  $('restartBtn').style.display='';}

function restartGame(){clrT();phase='idle';canTap=false;stopTimer();g={lv:1,sc:0,rd:0,st:0,pf:0};resetCells();updateHUD();setPhase('READY');msg("TAP LET'S GO!",'watch');$('actBtn').textContent="LET'S GO";$('actBtn').onclick=startRound;$('actBtn').disabled=false;$('restartBtn').style.display='none'}

buildCourt();
})();
</script>
</body>
</html>
