<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PARADISO · Leaderboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial,sans-serif;background:#000;color:#fff;min-height:100vh;padding:20px}
  .wrap{max-width:1000px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .brand{display:flex;flex-direction:column}
  .brand .kick{font-size:.7rem;font-weight:900;letter-spacing:.4em;text-transform:uppercase;color:#ff1e3c;text-shadow:0 0 20px rgba(255,30,60,.8)}
  .brand .name{font-size:2.4rem;font-weight:900;font-style:italic;letter-spacing:.03em;text-transform:uppercase;color:#fff;text-shadow:0 0 40px rgba(255,30,60,.7);line-height:1}
  .brand .sub{font-size:.7rem;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:#ff6b7f;margin-top:2px}
  .home-link{padding:8px 16px;border:1px solid rgba(255,30,60,.4);background:rgba(255,30,60,.1);color:#ff8896;border-radius:999px;font-size:.72rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;text-decoration:none}
  .filters{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
  .filter-group{display:flex;flex-direction:column;gap:6px}
  .filter-label{font-size:.62rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#8892a0}
  .chip-row{display:flex;gap:6px}
  .chip{padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#8892a0;font-size:.78rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .15s}
  .chip.active{background:linear-gradient(135deg,#ff1e3c,#c8102e);border-color:#ff1e3c;color:#fff}
  .chip.grid.active{background:linear-gradient(135deg,#00a8ff,#0066cc);border-color:#00a8ff}
  .board{background:rgba(255,255,255,.03);border:1px solid rgba(255,30,60,.2);border-radius:14px;overflow:hidden}
  .board-head{display:grid;grid-template-columns:70px 1fr 120px 140px 60px;gap:12px;padding:14px 20px;background:rgba(255,30,60,.12);font-size:.66rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:#ff8896}
  .board-head .edit-col{opacity:0}
  .row{display:grid;grid-template-columns:70px 1fr 120px 140px 60px;gap:12px;padding:14px 20px;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
  .row:hover{background:rgba(255,255,255,.03)}
  .rank{font-size:1.4rem;font-weight:900;color:#8892a0;font-family:'Courier New',monospace}
  .row:nth-child(1) .rank{color:#ffd35a;text-shadow:0 0 20px rgba(255,211,90,.6)}
  .row:nth-child(2) .rank{color:#e0e0e0}
  .row:nth-child(3) .rank{color:#cd7f32}
  .pname{font-size:1.3rem;font-weight:900;color:#fff}
  .pscore{font-size:1.5rem;font-weight:900;color:#ff1e3c;font-family:'Courier New',monospace;text-shadow:0 0 20px rgba(255,30,60,.5)}
  .pmeta{font-size:.68rem;font-weight:700;color:#8892a0;text-transform:uppercase;letter-spacing:.06em}
  .row-del{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:1.1rem;opacity:0;transition:opacity .15s}
  .row:hover .row-del{opacity:.7}
  .row-del:hover{opacity:1!important}
  .empty{padding:50px 20px;text-align:center;color:#5a6070;font-size:1rem}
  .edit-bar{margin-top:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 20px}
  .edit-locked{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .edit-locked .txt{font-size:.8rem;color:#8892a0}
  .edit-unlock-btn{padding:10px 18px;border:1px solid rgba(255,30,60,.4);background:rgba(255,30,60,.12);color:#ff8896;border-radius:8px;font-weight:900;font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .edit-form{display:none;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .edit-form.show{display:flex}
  .ef{display:flex;flex-direction:column;gap:5px}
  .ef label{font-size:.6rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#8892a0}
  .ef input,.ef select{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.9);color:#222;font-size:.95rem;font-weight:700}
  .ef input#f-name{width:180px}
  .ef input#f-score{width:100px}
  .add-btn{padding:11px 22px;border:none;border-radius:8px;background:linear-gradient(135deg,#ff1e3c,#c8102e);color:#fff;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-size:.85rem}
  .util-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .util-btn{padding:8px 14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#8892a0;border-radius:8px;font-size:.72rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .util-btn.danger{border-color:rgba(197,48,48,.4);color:#ff8888}
  .lock-again{padding:8px 14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#8892a0;border-radius:8px;font-size:.72rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.show{display:flex}
  .modal-box{width:100%;max-width:340px;background:rgba(255,255,255,.05);border:1px solid rgba(255,30,60,.3);border-radius:14px;padding:26px}
  .modal-title{font-size:.72rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#ff1e3c;text-align:center;margin-bottom:16px}
  .modal-box input{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:1rem;margin-bottom:12px}
  .modal-box button{width:100%;padding:12px;border:none;border-radius:8px;background:#ff1e3c;color:#fff;font-weight:900;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;margin-bottom:8px}
  .modal-box button.ghost{background:rgba(255,255,255,.08);color:#8892a0}
  .modal-msg{text-align:center;font-size:.8rem;color:#ff8888;min-height:16px}
  @media(max-width:640px){
    .board-head,.row{grid-template-columns:50px 1fr 80px;gap:8px}
    .board-head .meta-col,.row .pmeta,.board-head .edit-col,.row .row-del{display:none}
    .brand .name{font-size:1.7rem}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="kick">⚡ Reaction Arena</div>
      <div class="name">PARADISO</div>
      <div class="sub">Leaderboard</div>
    </div>
    <a class="home-link" href="/vr-lab.html">← Arena</a>
  </div>

  <div class="filters">
    <div class="filter-group">
      <div class="filter-label">Court</div>
      <div class="chip-row" id="court-filter">
        <button class="chip active" data-court="all" onclick="setCourt('all',this)">All</button>
        <button class="chip" data-court="open" onclick="setCourt('open',this)">Open Court</button>
        <button class="chip grid" data-court="grid" onclick="setCourt('grid',this)">The Grid</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Tempo</div>
      <div class="chip-row" id="tempo-filter">
        <button class="chip active" data-tempo="all" onclick="setTempo('all',this)">All</button>
        <button class="chip" data-tempo="80" onclick="setTempo('80',this)">80</button>
        <button class="chip" data-tempo="100" onclick="setTempo('100',this)">100</button>
        <button class="chip" data-tempo="120" onclick="setTempo('120',this)">120</button>
      </div>
    </div>
  </div>

  <div class="board">
    <div class="board-head">
      <div>Rank</div><div>Name</div><div>Score</div><div class="meta-col">Court · Tempo</div><div class="edit-col">×</div>
    </div>
    <div id="rows"></div>
  </div>

  <div class="edit-bar">
    <div class="edit-locked" id="edit-locked">
      <div class="txt">🔒 Viewing mode. Scores are managed by the coach.</div>
      <button class="edit-unlock-btn" onclick="openUnlock()">Coach Login</button>
    </div>
    <div class="edit-form" id="edit-form">
      <div class="ef"><label>Name</label><input id="f-name" placeholder="Player name" maxlength="20" onkeydown="if(event.key==='Enter')addScore()"></div>
      <div class="ef"><label>Score</label><input id="f-score" type="number" placeholder="0" onkeydown="if(event.key==='Enter')addScore()"></div>
      <div class="ef"><label>Court</label>
        <select id="f-court"><option value="open">Open Court</option><option value="grid">The Grid</option></select>
      </div>
      <div class="ef"><label>Tempo</label>
        <select id="f-tempo"><option value="80">80</option><option value="100">100</option><option value="120">120</option></select>
      </div>
      <button class="add-btn" onclick="addScore()">+ Add Score</button>
    </div>
    <div class="util-row" id="util-row" style="display:none">
      <button class="util-btn danger" onclick="clearBoard()">Clear Board (New Week)</button>
      <button class="lock-again" onclick="lockEditing()">🔒 Lock Editing</button>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title">🔒 Coach Login</div>
    <input id="pass-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button onclick="tryUnlock()">Unlock Editing</button>
    <button class="ghost" onclick="closeUnlock()">Cancel</button>
    <div class="modal-msg" id="modal-msg"></div>
  </div>
</div>

<script>
var $=function(id){return document.getElementById(id)};

// ══════════════════════════════════════════════════
//  SET THE COACH PASSWORD HERE
// ══════════════════════════════════════════════════
var COACH_PASSWORD = 'COACH2026';
// ══════════════════════════════════════════════════

var STORAGE_KEY = 'paradiso-leaderboard';
var scores = [];
var filterCourt = 'all', filterTempo = 'all';
var editing = false;

function load(){
  try{ scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e){ scores = []; }
  if(!Array.isArray(scores)) scores = [];
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); }catch(e){} }

var COURT_LABEL = {open:'Open Court', grid:'The Grid'};

function render(){
  var list = scores.filter(function(s){
    if(filterCourt!=='all' && s.court!==filterCourt) return false;
    if(filterTempo!=='all' && String(s.tempo)!==String(filterTempo)) return false;
    return true;
  }).sort(function(a,b){ return b.score - a.score; });

  var wrap = $('rows');
  if(!list.length){
    wrap.innerHTML = '<div class="empty">No scores yet' + (editing ? ' — add the first one below.' : '.') + '</div>';
    return;
  }
  wrap.innerHTML = list.map(function(s, i){
    var courtClass = s.court==='grid' ? 'style="color:#00a8ff"' : '';
    return '<div class="row">'
      + '<div class="rank">' + (i+1) + '</div>'
      + '<div class="pname">' + escapeHtml(s.name) + '</div>'
      + '<div class="pscore">' + s.score + '</div>'
      + '<div class="pmeta"><span '+courtClass+'>'+COURT_LABEL[s.court]+'</span> · '+s.tempo+'</div>'
      + '<button class="row-del" onclick="delScore('+s.id+')" '+(editing?'':'style="display:none"')+'>✕</button>'
      + '</div>';
  }).join('');
}

function escapeHtml(s){ return String(s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]}); }

function setCourt(c, el){
  filterCourt = c;
  [].forEach.call(document.querySelectorAll('#court-filter .chip'), function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  render();
}
function setTempo(t, el){
  filterTempo = t;
  [].forEach.call(document.querySelectorAll('#tempo-filter .chip'), function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  render();
}

function openUnlock(){ $('modal').classList.add('show'); $('pass-input').value=''; $('modal-msg').textContent=''; setTimeout(function(){$('pass-input').focus()},50); }
function closeUnlock(){ $('modal').classList.remove('show'); }
function tryUnlock(){
  if($('pass-input').value === COACH_PASSWORD){
    editing = true;
    closeUnlock();
    $('edit-locked').style.display='none';
    $('edit-form').classList.add('show');
    $('util-row').style.display='flex';
    render();
  } else {
    $('modal-msg').textContent = 'Wrong password';
  }
}
function lockEditing(){
  editing = false;
  $('edit-locked').style.display='flex';
  $('edit-form').classList.remove('show');
  $('util-row').style.display='none';
  render();
}

function addScore(){
  if(!editing) return;
  var name = $('f-name').value.trim();
  var score = parseInt($('f-score').value, 10);
  if(!name){ $('f-name').focus(); return; }
  if(isNaN(score)){ $('f-score').focus(); return; }
  scores.push({
    id: Date.now() + Math.floor(Math.random()*1000),
    name: name, score: score,
    court: $('f-court').value, tempo: $('f-tempo').value
  });
  save();
  $('f-name').value=''; $('f-score').value=''; $('f-name').focus();
  render();
}

function delScore(id){
  if(!editing) return;
  scores = scores.filter(function(s){ return s.id !== id; });
  save(); render();
}

function clearBoard(){
  if(!editing) return;
  if(!confirm('Clear the ENTIRE board for a new week? This removes all scores and cannot be undone.')) return;
  scores = []; save(); render();
}

load();
render();
</script>
</body>
</html>
