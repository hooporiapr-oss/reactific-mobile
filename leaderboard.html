<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard | Reactific™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;font-family:'Segoe UI',Arial,sans-serif;
  background:radial-gradient(ellipse at 20% 10%,rgba(0,140,255,.12),transparent 50%),
             radial-gradient(ellipse at 80% 90%,rgba(155,89,182,.1),transparent 50%),
             linear-gradient(180deg,#050810,#020508);
  color:#fff}

.header{background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.08);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-size:1.4rem;font-weight:900;font-style:italic;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 0 20px rgba(0,140,255,.5)}
.logo span{color:#008cff}
.back-link{display:flex;align-items:center;gap:6px;padding:7px 16px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:#fff;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-decoration:none}

.hero{padding:20px 20px 6px;text-align:center}
.hero-title{font-size:1.6rem;font-weight:900;margin-bottom:4px}
.hero-title span{color:#008cff}
.hero-sub{font-size:.75rem;color:#8892a0;letter-spacing:.08em}

.tabs{display:flex;gap:8px;overflow-x:auto;padding:16px 16px 4px;max-width:960px;margin:0 auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:999px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#a7adba;font-size:.75rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{color:#fff;border-color:var(--tc);background:var(--tc-bg)}
.tab-ico{font-size:1rem}

.windowrow{display:flex;gap:6px;padding:14px 16px 0;max-width:960px;margin:0 auto}
.win-btn{flex:1;max-width:140px;padding:8px 0;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#8892a0;font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.win-btn.active{color:#fff;border-color:#008cff;background:rgba(0,140,255,.15)}

.pb-bar{display:flex;align-items:center;justify-content:space-between;max-width:960px;margin:0 auto;padding:12px 16px 0}
.pb-label{font-size:.7rem;color:#8892a0;letter-spacing:.06em;text-transform:uppercase}
.pb-val{font-size:.85rem;font-weight:900;color:#ffd35a}

.boards{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 16px 28px;max-width:960px;margin:0 auto}
.board-col{}
.board-title{font-size:.65rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#8892a0;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.board-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lb-wrap{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;min-height:80px}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.lb-row:last-child{border-bottom:none}
.lb-row.you{background:rgba(0,140,255,.1)}
.lb-rank{width:24px;font-size:.88rem;font-weight:900;color:#8892a0;text-align:center;flex-shrink:0}
.lb-row:nth-child(1) .lb-rank{color:#ffd35a}
.lb-row:nth-child(2) .lb-rank{color:#c8ccd4}
.lb-row:nth-child(3) .lb-rank{color:#cd8a4a}
.lb-name{flex:1;font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-row.you .lb-name{font-weight:900}
.lb-score{font-size:.86rem;font-weight:900;color:#008cff;flex-shrink:0}
.lb-loading{text-align:center;padding:28px;color:#3a4250;font-size:.78rem}
.lb-empty{text-align:center;padding:28px;color:#3a4250;font-size:.78rem;line-height:1.6}

@media(max-width:520px){
  .boards{grid-template-columns:1fr;gap:20px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">REACTIFIC<span>™</span></div>
  <a class="back-link" href="/hub.html">← Hub</a>
</div>

<div class="hero">
  <div class="hero-title">Leader<span>board</span></div>
  <div class="hero-sub" id="classLabel">Loading…</div>
</div>

<div class="tabs" id="tabs"></div>

<div class="windowrow">
  <button class="win-btn active" data-win="today">Today</button>
  <button class="win-btn" data-win="week">This Week</button>
  <button class="win-btn" data-win="alltime">All-Time</button>
</div>

<div class="pb-bar">
  <span class="pb-label">Your personal best</span>
  <span class="pb-val" id="pbVal">—</span>
</div>

<div class="boards">
  <div class="board-col">
    <div class="board-title"><span class="dot" style="background:#008cff"></span>My Grade</div>
    <div class="lb-wrap" id="lbClass"><div class="lb-loading">Loading…</div></div>
  </div>
  <div class="board-col">
    <div class="board-title"><span class="dot" style="background:#ffd35a"></span>School-Wide</div>
    <div class="lb-wrap" id="lbSchool"><div class="lb-loading">Loading…</div></div>
  </div>
</div>

<script>
var API='https://api.reactificgaming.com';
var token=localStorage.getItem('rct-token');
var user=JSON.parse(localStorage.getItem('rct-user')||'null');
if(!token||!user){window.location.href='/login.html';throw new Error('Not logged in')}

var GAMES=[
  {id:'reaction', name:'Reaction Control', icon:'⚡', color:'#9B59B6'},
  {id:'numhunt',  name:'Number Hunt',      icon:'🎯', color:'#ff6b00'},
  {id:'recovery', name:'Echo Recall',      icon:'🌱', color:'#9ACD32'},
  {id:'pattern',  name:'Pattern Recognition', icon:'🧩', color:'#FF6B35'},
  {id:'sequence', name:'Flash Recall',     icon:'🔢', color:'#00CED1'},
  {id:'focus',    name:'Sequence Control', icon:'🎵', color:'#00D9A5'}
];

var currentGame='reaction';
var currentWindow='today';

document.getElementById('classLabel').textContent=user.class_id?'Comparing your grade vs the whole school':'Join a class to see your grade rankings';

var tabsEl=document.getElementById('tabs');
GAMES.forEach(function(g){
  var btn=document.createElement('button');
  btn.className='tab'+(g.id===currentGame?' active':'');
  btn.style.setProperty('--tc', g.color);
  btn.style.setProperty('--tc-bg', g.color+'22');
  btn.innerHTML='<span class="tab-ico">'+g.icon+'</span>'+g.name;
  btn.onclick=function(){
    currentGame=g.id;
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    btn.classList.add('active');
    loadBoth();
    loadPersonalBest();
  };
  tabsEl.appendChild(btn);
});

document.querySelectorAll('.win-btn').forEach(function(btn){
  btn.onclick=function(){
    currentWindow=btn.dataset.win;
    document.querySelectorAll('.win-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    loadBoth();
  };
});

function escapeHtml(s){
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function renderRows(entries, elId){
  var wrap=document.getElementById(elId);
  if(!entries||!entries.length){
    wrap.innerHTML='<div class="lb-empty">No scores yet.<br>Be the first!</div>';
    return;
  }
  wrap.innerHTML=entries.map(function(e){
    var isYou=user.username&&e.name===user.username;
    return '<div class="lb-row'+(isYou?' you':'')+'">'+
      '<div class="lb-rank">'+e.rank+'</div>'+
      '<div class="lb-name">'+escapeHtml(e.name)+(isYou?' ★':'')+'</div>'+
      '<div class="lb-score">'+e.score+'</div>'+
    '</div>';
  }).join('');
}

function loadBoth(){
  document.getElementById('lbClass').innerHTML='<div class="lb-loading">Loading…</div>';
  document.getElementById('lbSchool').innerHTML='<div class="lb-loading">Loading…</div>';

  var base=API+'/api/leaderboard/'+currentGame+'?window='+currentWindow+'&limit=10';

  // Class leaderboard — scoped to student's class if they have one
  var classUrl=user.class_id?base+'&class_id='+user.class_id:null;
  if(classUrl){
    fetch(classUrl)
      .then(function(r){return r.json()})
      .then(function(d){renderRows(d.entries,'lbClass')})
      .catch(function(){document.getElementById('lbClass').innerHTML='<div class="lb-empty">Couldn\'t load.</div>'});
  }else{
    document.getElementById('lbClass').innerHTML='<div class="lb-empty">Join a class to see your grade rankings.</div>';
  }

  // School-wide leaderboard — no class filter
  fetch(base)
    .then(function(r){return r.json()})
    .then(function(d){renderRows(d.entries,'lbSchool')})
    .catch(function(){document.getElementById('lbSchool').innerHTML='<div class="lb-empty">Couldn\'t load.</div>'});
}

function loadPersonalBest(){
  var pbEl=document.getElementById('pbVal');
  pbEl.textContent='—';
  fetch(API+'/api/scores/personal-best/'+currentGame,{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){return r.json()})
    .then(function(d){pbEl.textContent=d.has_played?(d.score+' pts'):'Not played yet'})
    .catch(function(){pbEl.textContent='—'});
}

loadBoth();
loadPersonalBest();
</script>
</body>
</html>
