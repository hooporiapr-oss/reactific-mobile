<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reactific VR Lab | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden}

body{
  display:flex;
  flex-direction:column;
  background:radial-gradient(ellipse at center,#0e0018 0%,#000 70%);
  height:100vh;
  padding:12px;
}

/* HEADER — compact horizontal */
.header{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:16px;
  align-items:center;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:2px solid rgba(155,89,182,.2);
  flex-shrink:0;
}

.logo{
  font-size:1.4rem;
  font-weight:900;
  font-style:italic;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#fff;
  text-shadow:0 0 40px rgba(155,89,182,.8);
}
.logo span{color:#9B59B6}

.vr-badge{
  background:rgba(155,89,182,.2);
  color:#9B59B6;
  padding:4px 10px;
  border-radius:6px;
  font-size:.65rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.btn-back{
  padding:6px 12px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  border-radius:6px;
  cursor:pointer;
  font-size:.65rem;
  font-weight:900;
  text-transform:uppercase;
}
.btn-back:hover{background:rgba(255,255,255,.15)}

/* MAIN CONTENT — 3 columns */
.main{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:12px;
  flex:1;
  overflow:hidden;
}

/* LEFT: Bonus Games */
.bonus-section{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.bonus-title{
  font-size:.7rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#8892a0;
  margin-bottom:4px;
}
.bonus-grid{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.bonus-card{
  background:rgba(155,89,182,.08);
  border:1px solid rgba(155,89,182,.25);
  border-radius:8px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
}
.bonus-card:hover{
  background:rgba(155,89,182,.15);
  border-color:#9B59B6;
}
.bonus-icon{font-size:1.3rem;margin-bottom:4px}
.bonus-name{font-size:.65rem;font-weight:900;color:#fff;margin-bottom:1px}
.bonus-desc{font-size:.55rem;color:#8892a0}

/* CENTER: Reactific Sport */
.flagship-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(155,89,182,.2),rgba(0,150,136,.1));
  border:2px solid #9B59B6;
  border-radius:12px;
  padding:16px;
  box-shadow:0 0 40px rgba(155,89,182,.3);
  gap:12px;
}

.flagship-badge{
  display:inline-block;
  background:#9B59B6;
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:.55rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.flagship-title{
  font-size:1.3rem;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#fff;
}

.flagship-desc{
  font-size:.7rem;
  color:#8892a0;
  text-align:center;
  line-height:1.4;
}

.play-btn{
  width:100%;
  padding:12px 20px;
  background:linear-gradient(135deg,#9B59B6,#A873B8);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:.95rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 0 30px rgba(155,89,182,.6);
  transition:all .2s;
}
.play-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(155,89,182,1)}

/* RIGHT: Leaderboard */
.leaderboard-section{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.leaderboard-header{
  font-size:.7rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#8892a0;
}
.leaderboard-list{
  background:rgba(0,0,0,.3);
  border:1px solid rgba(155,89,182,.2);
  border-radius:8px;
  padding:8px;
  overflow-y:auto;
  flex:1;
}
.lb-row{
  display:grid;
  grid-template-columns:28px 1fr 50px 35px;
  gap:6px;
  align-items:center;
  padding:5px 0;
  border-bottom:1px solid rgba(155,89,182,.1);
  font-size:.65rem;
}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-weight:900;color:#ffd35a;text-align:center}
.lb-name{color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{color:#9B59B6;font-weight:900;text-align:right}
.lb-tier{color:#8892a0;text-align:center;font-size:.55rem;text-transform:uppercase}
.lb-loading{text-align:center;padding:12px;color:#8892a0;font-size:.65rem}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:rgba(155,89,182,.1)}
::-webkit-scrollbar-thumb{background:rgba(155,89,182,.4);border-radius:2px}

/* MOBILE: Stack vertically */
@media (max-width:1024px){
  .main{grid-template-columns:1fr}
  .header{grid-template-columns:auto 1fr auto;gap:8px}
  .logo{font-size:1.1rem}
  .bonus-grid{flex-direction:row;flex-wrap:wrap}
  .bonus-card{flex:1;min-width:80px}
}

@media (max-width:640px){
  body{padding:8px}
  .header{gap:6px;margin-bottom:8px}
  .logo{font-size:.9rem}
  .main{grid-template-columns:1fr}
  .flagship-title{font-size:1rem}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">REACTIFIC<span>™</span></div>
  <div class="vr-badge">🎮 VR Lab Session</div>
  <button class="btn-back" onclick="window.location.href='/index.html'">← Back</button>
</div>

<div class="main">
  <!-- LEFT: BONUS GAMES -->
  <div class="bonus-section">
    <div class="bonus-title">Bonus</div>
    <div class="bonus-grid">
      <div class="bonus-card" onclick="window.location.href='/vr-echo.html'">
        <div class="bonus-icon">🧠</div>
        <div class="bonus-name">Echo</div>
        <div class="bonus-desc">Memory</div>
      </div>
      <div class="bonus-card" onclick="window.location.href='/vr-pattern.html'">
        <div class="bonus-icon">🎨</div>
        <div class="bonus-name">Pattern</div>
        <div class="bonus-desc">Visual</div>
      </div>
      <div class="bonus-card" onclick="window.location.href='/vr-numhunt.html'">
        <div class="bonus-icon">🔢</div>
        <div class="bonus-name">Number</div>
        <div class="bonus-desc">Math</div>
      </div>
      <div class="bonus-card" onclick="window.location.href='/vr-reaction.html'">
        <div class="bonus-icon">⚡</div>
        <div class="bonus-name">Reaction</div>
        <div class="bonus-desc">Classic</div>
      </div>
    </div>
  </div>

  <!-- CENTER: REACTIFIC SPORT -->
  <div class="flagship-section">
    <div class="flagship-badge">🏆 Championship Sport</div>
    <div class="flagship-title">Reactific Sport</div>
    <div class="flagship-desc">Master the Court. Defend Your Rank.</div>
    <button class="play-btn" onclick="window.location.href='/vr-reactific.html'">🏆 Enter Court</button>
  </div>

  <!-- RIGHT: LEADERBOARD -->
  <div class="leaderboard-section">
    <div class="leaderboard-header">Top 20</div>
    <div class="leaderboard-list" id="leaderboard">
      <div class="lb-loading">Loading...</div>
    </div>
  </div>
</div>

<script>
var API='https://api.reactificgaming.com';

async function loadLeaderboard(){
  try{
    var res=await fetch(API+'/api/scores/leaderboard?limit=20');
    if(!res.ok)throw new Error('Failed');
    var data=await res.json();
    var scores=data.scores||[];
    if(!scores.length){
      document.getElementById('leaderboard').innerHTML='<div class="lb-loading">No scores</div>';
      return;
    }
    var html=scores.map(function(s,i){
      return '<div class="lb-row"><div class="lb-rank">#'+(i+1)+'</div><div class="lb-name">'+s.username+'</div><div class="lb-score">'+s.score+'</div><div class="lb-tier">L'+s.level+'</div></div>';
    }).join('');
    document.getElementById('leaderboard').innerHTML=html;
  }catch(e){
    document.getElementById('leaderboard').innerHTML='<div class="lb-loading">Coming online...</div>';
  }
}

setInterval(loadLeaderboard,5000);
loadLeaderboard();
</script>

</body>
</html>
