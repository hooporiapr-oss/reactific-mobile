<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>5-Minute Drill | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;color:#fff;background:#000;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#space{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a1a2e 0%,#000 70%);overflow:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
#edge-glow{position:fixed;inset:0;pointer-events:none;z-index:1;border:3px solid transparent;box-shadow:inset 0 0 80px rgba(0,217,165,.28),0 0 80px rgba(0,217,165,.1)}
#beat-pulse{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,217,165,.16) 100%)}
#flash{position:fixed;inset:0;pointer-events:none;z-index:10;opacity:0;transition:opacity .1s}

#hud{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-around;align-items:center;padding:14px 22px;background:linear-gradient(180deg,rgba(0,0,0,.85),transparent)}
.hud-box{text-align:center}
.hud-label{font-size:.5rem;color:#00D9A5;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px}
.hud-val{font-size:2rem;font-weight:900;line-height:1}
#hTime{color:#00D9A5}#hTaps{color:#fff;font-size:2.6rem}#hBest{font-size:1.3rem;color:#9fb3c8}

#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-size:1.6rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;text-align:center;pointer-events:none;text-shadow:0 0 30px currentColor;transition:opacity .3s}
#msg.watch{color:#00D9A5}#msg.go{color:#ffd35a}

#target{position:fixed;z-index:15;border-radius:50%;cursor:pointer;transform:translate(-50%,-50%) scale(0);transition:transform .12s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;pointer-events:none;padding:22px;box-sizing:content-box}
#target.visible{transform:translate(-50%,-50%) scale(1);pointer-events:all}
#target-inner{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center}
#gng-score-num{display:none;font-size:4.5rem;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 24px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.6);pointer-events:none;transition:transform .12s,color .12s}
#gng-score-num.on{display:block}
.ripple{position:fixed;border-radius:50%;border:3px solid #00D9A5;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:14;animation:rippleOut .5s ease-out forwards}
@keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}

#controls{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;justify-content:center;gap:10px;padding:10px 16px 14px;background:linear-gradient(0deg,rgba(0,0,0,.9),transparent)}
.ctrl-btn{height:48px;flex:0 1 170px;max-width:200px;border:2px solid rgba(0,217,165,.5);background:rgba(0,0,0,.4);border-radius:12px;color:#fff;font-size:1rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(4px);text-decoration:none;display:flex;align-items:center;justify-content:center}

#screen-intro{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1a2e 0%,#000 70%);padding:20px;text-align:center}
.vrr-logo{font-size:2.8rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 0 60px rgba(0,217,165,1);margin-bottom:6px}
.vrr-logo span{color:#00D9A5}
.vrr-sub{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:#00D9A5;margin-bottom:28px}
.rule-card{max-width:440px;border:1px solid rgba(0,217,165,.25);background:rgba(0,217,165,.04);border-radius:18px;padding:26px;margin-bottom:24px}
.tempo-label{font-size:.62rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:#8aa;margin-bottom:14px}
.tempo-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:440px;margin-bottom:26px}
.mode-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:440px;margin-bottom:22px}
.mode-btn{height:74px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);border-radius:16px;color:#fff;font-size:1.05rem;font-weight:900;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .2s}
.mode-btn .m-ic{font-size:1.3rem}
.mode-btn small{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:#8892a0;font-weight:700}
.mode-btn.active{border-color:#fff;background:rgba(255,255,255,.12);box-shadow:0 0 24px rgba(255,255,255,.2)}
.tempo-btn.hidden{display:none}
.tempo-btn{height:96px;border:2px solid var(--tc);background:transparent;border-radius:16px;color:#fff;font-weight:900;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.tempo-btn .t-bpm{font-size:1.9rem;line-height:1;color:var(--tc)}
.tempo-btn .t-unit{font-size:.5rem;letter-spacing:.2em;color:#8892a0;margin-top:2px}
.tempo-btn small{font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:#a7adba;margin-top:8px}
.tempo-btn.active{background:var(--tc);box-shadow:0 0 30px var(--tc)}
.tempo-btn.active .t-bpm{color:#04121a}
.tempo-btn.active .t-unit,.tempo-btn.active small{color:rgba(0,0,0,.6)}
.rule-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;text-align:left}
.rule-row:last-child{margin-bottom:0}
.rule-n{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:2px solid #00D9A5;color:#00D9A5;font-weight:900;display:flex;align-items:center;justify-content:center}
.rule-t{font-size:.88rem;color:#cbd5e1;line-height:1.4}
.rule-t b{color:#fff}
.big-btn{width:100%;max-width:440px;height:72px;border:none;border-radius:20px;background:linear-gradient(135deg,#00D9A5,#00b88d);color:#04121a;font-size:1.3rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 40px rgba(0,217,165,.7);animation:btnPulse 2s ease-in-out infinite}
@keyframes btnPulse{0%,100%{box-shadow:0 0 40px rgba(0,217,165,.7)}50%{box-shadow:0 0 80px rgba(0,217,165,1)}}
.intro-back{position:fixed;top:16px;left:16px;padding:8px 16px;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:#fff;font-size:.78rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;text-decoration:none;z-index:60}
.best-line{margin-top:18px;font-size:.85rem;color:#9fb3c8}
.tempo-hint{font-size:.8rem;color:#9fb3c8;line-height:1.4;margin-bottom:20px;max-width:420px;min-height:2.4em;display:flex;align-items:center;justify-content:center;text-align:center}
.best-line b{color:#00D9A5}

#screen-end{position:fixed;inset:0;z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1a2e 0%,#000 70%);text-align:center;padding:20px}
.final-num{font-size:6rem;font-weight:900;color:#00D9A5;line-height:1;text-shadow:0 0 60px rgba(0,217,165,.9)}
.final-label{font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:#9fb3c8;margin-top:10px}
#screen-end h2{font-size:1.8rem;font-weight:900;margin:24px 0 8px}
#endSub{font-size:.9rem;color:#9fb3c8;line-height:1.6;max-width:400px}
.end-btns{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* countdown overlay */
#countdown{position:fixed;inset:0;z-index:56;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1a2e 0%,#000 70%)}
#bigCount{font-size:8rem;font-weight:900;color:#00D9A5;text-shadow:0 0 60px rgba(0,217,165,.9)}
@media(max-width:420px){.vrr-logo{font-size:2.1rem}.big-btn{height:60px;font-size:1.1rem}}
</style>
</head>
<body>

<div id="space">
  <canvas id="stars"></canvas>
  <div id="edge-glow"></div>
  <div id="beat-pulse"></div>
  <div id="flash"></div>
</div>

<div id="hud">
  <div class="hud-box"><div class="hud-label" id="hRedLabel">Reds</div><div class="hud-val"><span id="hReds">0</span><span style="font-size:.7rem;color:#5a6472"> / <span id="hRedTotal">50</span></span></div></div>
  <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val" id="hTaps">0</div></div>
  <div class="hud-box"><div class="hud-label">Best</div><div class="hud-val" id="hBest">0</div></div>
</div>

<div id="msg" class="watch"></div>
<div id="target"><div id="target-inner"><span id="gng-score-num">0</span></div></div>

<div id="controls">
  <a class="ctrl-btn" href="/vr-lab.html">← Exit</a>
</div>

<!-- INTRO -->
<div id="screen-intro">
  <a class="intro-back" href="/vr-lab.html">← Exit</a>
  <div class="vrr-logo">REACTION <span>CONTROL</span></div>
  <div class="vrr-sub">Tap to the Beat of the Rhythm · Reactific™</div>
  <div class="tempo-label">Choose Your Game</div>
  <div class="mode-row">
    <button class="mode-btn active" data-mode="coord"><span class="m-ic">🎯</span>Eye-Hand<small>Tap every target</small></button>
    <button class="mode-btn" data-mode="gng"><span class="m-ic">🔴</span>Go / No-Go<small>Tap only on red</small></button>
  </div>
  <div class="tempo-label">Choose Your Tempo</div>
  <div class="tempo-row">
    <button class="tempo-btn active" data-tempo="80" style="--tc:#00D9A5"><span class="t-bpm">80</span><span class="t-unit">BPM</span><small>Fast</small></button>
    <button class="tempo-btn" data-tempo="100" style="--tc:#ff6b00"><span class="t-bpm">100</span><span class="t-unit">BPM</span><small>Elite</small></button>
    <button class="tempo-btn" data-tempo="120" id="tempo120" style="--tc:#FF1493"><span class="t-bpm">120</span><span class="t-unit">BPM</span><small>Reactific</small></button>
  </div>
  <div class="tempo-hint" id="tempoHint">Targets pop up — tap every one, fast! Eye-hand coordination. 50 taps.</div>
  <button class="big-btn" id="bigStart" onclick="startDrill()">🎯 START · TAP EVERY TARGET</button>
  <div class="best-line" id="bestLine"></div>
</div>

<!-- COUNTDOWN -->
<div id="countdown"><div id="bigCount">3</div></div>

<!-- END -->
<div id="screen-end">
  <div class="final-num" id="endNum">0</div>
  <div class="final-label">Taps</div>
  <h2 id="endHead">Drill Complete!</h2>
  <div id="endSub">Great focus. Play again and beat your number.</div>
  <div class="end-btns">
    <button class="ctrl-btn" onclick="location.reload()">↻ Play Again</button>
    <a class="ctrl-btn" href="/vr-lab.html">← Games</a>
  </div>
</div>

<script>
var API='https://api.reactificgaming.com';
// Two game modes at 80/100, go/no-go also at 120.
// GO/NO-GO: colors cycle, tap only on red. COORD: tap every target that pops up.
var MODES={
  gng:{
    '80': {bpm:80,  color:'#00D9A5', glow:'rgba(0,217,165,1)', gid:'drill',    bestKey:'rct-drill-best',    flashMs:750, bust:true, centered:false},
    '100':{bpm:100, color:'#ff6b00', glow:'rgba(255,107,0,1)', gid:'drill100', bestKey:'rct-drill100-best', flashMs:600, bust:true, centered:false},
    '120':{bpm:120, color:'#FF1493', glow:'rgba(255,20,147,1)', gid:'drill120', bestKey:'rct-drill120-best', flashMs:500, bust:true, centered:true}
  },
  coord:{
    '80': {bpm:80,  color:'#00D9A5', glow:'rgba(0,217,165,1)', gid:'coord80',  bestKey:'rct-coord80-best',  windowMs:1100, size:80},
    '100':{bpm:100, color:'#ff6b00', glow:'rgba(255,107,0,1)', gid:'coord100', bestKey:'rct-coord100-best', windowMs:850,  size:72}
  }
};
var mode='coord';               // selected mode
var TOTAL_REDS=50;              // go/no-go: ends after 50 reds
var TOTAL_TARGETS=50;          // coord: ends after 50 targets appear
var tempo='80';
var BEAT_BPM=80,COLOR='#00D9A5',GLOW='rgba(0,217,165,1)',SIZE=72,GAME_ID='drill',BEST_KEY='rct-drill-best';
var GO_NO_GO=false,FLASH_MS=500,BUST_ON=false,CENTERED=true;
var COORD=false,COORD_WINDOW=1000;
function applyTempo(t){
  tempo=t;var c=MODES[mode][t];
  if(!c){t='80';tempo='80';c=MODES[mode]['80'];}
  BEAT_BPM=c.bpm;COLOR=c.color;GLOW=c.glow;SIZE=c.size||72;GAME_ID=c.gid;BEST_KEY=c.bestKey;
  COORD=(mode==='coord');
  GO_NO_GO=(mode==='gng');
  FLASH_MS=c.flashMs||500;BUST_ON=!!c.bust;CENTERED=(c.centered!==false&&mode==='gng');
  COORD_WINDOW=c.windowMs||1000;
  // recolor edge glow + accent to the chosen tempo
  var eg=$('edge-glow');if(eg)eg.style.boxShadow='inset 0 0 80px '+GLOW.replace('1)','.28)')+',0 0 80px '+GLOW.replace('1)','.1)');
  loadBestForTempo();
}

(function(){var t=new URLSearchParams(location.search).get('t');if(t)localStorage.setItem('rct-token',t)})();
function $(id){return document.getElementById(id)}

var phase='idle';               // idle | running | done
var taps=0,best=0,endAt=0;
var timers=[],beatTimer=null,audioCtx=null;
var targetEl=$('target'),targetInner=$('target-inner');
var targetX=0,targetY=0,tapLocked=false;

/* tempo-aware best (device + server) */
function loadBestForTempo(){
  best=0;
  try{best=parseInt(localStorage.getItem(BEST_KEY)||'0',10)||0}catch(e){}
  $('hBest').textContent=best;
  $('bestLine').innerHTML=best>0?('Your best at '+BEAT_BPM+' BPM: <b>'+best+' taps</b>'):'';
  var token=localStorage.getItem('rct-token');
  if(!token)return;
  fetch(API+'/api/scores/personal-best/'+GAME_ID,{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){return r.json()}).then(function(d){
      if(d&&d.score&&d.score>best){best=d.score;$('hBest').textContent=best;$('bestLine').innerHTML='Your best at '+BEAT_BPM+' BPM: <b>'+best+' taps</b>'}
    }).catch(function(){});
}

/* tempo selector */
var HINTS={
  coord:{
    '80':'Targets pop up — tap every one, fast! Eye-hand coordination. 50 taps.',
    '100':'Faster pop-ups — tap every target! Eye-hand coordination. 50 taps.'
  },
  gng:{
    '80':'Moving target — tap ONLY on RED. Coordination + reaction. 50 reds.',
    '100':'Faster moving target — tap ONLY on RED. 50 reds.',
    '120':'Centered, colors flash fast — tap ONLY on RED. Pure reaction. 50 reds.'
  }
};
function refreshIntro(){
  var h=(HINTS[mode]&&HINTS[mode][tempo])||'';
  $('tempoHint').textContent=h;
  $('bigStart').textContent = mode==='coord' ? '🎯 START · TAP EVERY TARGET' : '🔴 START · TAP ONLY ON RED';
  // 120 only exists in go/no-go
  var t120=$('tempo120');
  if(mode==='coord'){t120.classList.add('hidden');if(tempo==='120'){selectTempo('80')}}
  else{t120.classList.remove('hidden')}
}
function selectTempo(t){
  tempo=t;
  document.querySelectorAll('.tempo-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tempo===t)});
  applyTempo(t);
  refreshIntro();
}
document.querySelectorAll('.mode-btn').forEach(function(btn){
  btn.onclick=function(){
    mode=btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    applyTempo(tempo);   // re-resolve config for new mode (handles 120 fallback)
    refreshIntro();
  };
});
document.querySelectorAll('.tempo-btn').forEach(function(btn){
  btn.onclick=function(){selectTempo(btn.dataset.tempo)};
});
applyTempo('80');refreshIntro();   // default

/* star field */
(function(){
  var c=$('stars'),ctx=c.getContext('2d'),stars=[];
  function size(){c.width=innerWidth;c.height=innerHeight}
  size();addEventListener('resize',size);
  for(var i=0;i<150;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.3,o:Math.random()*.6+.1,s:Math.random()*.5+.2});
  (function draw(){ctx.clearRect(0,0,c.width,c.height);var t=Date.now()/1000;stars.forEach(function(s){var p=s.o+Math.sin(t*s.s)*.13;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fillStyle='rgba(255,255,255,'+Math.max(0,Math.min(1,p))+')';ctx.fill()});requestAnimationFrame(draw)})();
})();

function msg(t,c){var e=$('msg');e.textContent=t;e.className=c||'watch'}
function clrT(){timers.forEach(clearTimeout);timers=[]}

function startDrill(){
  if(phase==='running')return;
  initAudio();
  $('screen-intro').style.display='none';
  $('countdown').style.display='flex';
  var n=3;$('bigCount').textContent=n;
  var iv=setInterval(function(){
    n--;
    if(n<=0){clearInterval(iv);$('countdown').style.display='none';runDrill()}
    else{$('bigCount').textContent=n}
  },800);
}

function runDrill(){
  phase='running';taps=0;$('hTaps').textContent='0';misses=0;
  if(COORD){
    msg('TAP EVERY TARGET!','go');
    timers.push(setTimeout(function(){msg('','go')},1400));
    coordStart();
  }else{
    var startMsg = CENTERED ? 'TAP ONLY ON RED!' : 'MOVE & TAP ONLY ON RED!';
    msg(startMsg,'go');
    timers.push(setTimeout(function(){msg('','go')},1600));
    goNoGoStart();
  }
}

/* ── EYE-HAND COORDINATION (80/100): targets pop up in random spots. Tap each
   one before it expires. Hit = +1 (score shows on the circle). Miss (too slow)
   = no score, no penalty. 50 targets appear, then done. ── */
var coordTimer=null,coordWindow=null,targetsSeen=0,coordLive=false;
function coordStart(){
  targetsSeen=0;coordLive=false;
  $('gng-score-num').textContent='0';$('gng-score-num').classList.add('on');
  var rt=$('hRedTotal');if(rt)rt.textContent=TOTAL_TARGETS;
  var rl=$('hRedLabel');if(rl)rl.textContent='Targets';
  $('hReds')&&($('hReds').textContent='0');
  startBeat();
  coordNext();
}
function coordRenderMoving(){
  var big=Math.max(90,Math.min(150,Math.min(innerWidth,innerHeight)*0.20));
  var pad=big/2+20;
  targetX=pad+Math.random()*(innerWidth-pad*2);
  targetY=150+Math.random()*(innerHeight-230);
  targetEl.style.left=targetX+'px';targetEl.style.top=targetY+'px';
  targetEl.style.width=big+'px';targetEl.style.height=big+'px';
  targetInner.style.background='radial-gradient(circle at 38% 35%,'+COLOR+','+COLOR+'aa)';
  targetInner.style.boxShadow='0 0 45px '+GLOW+',0 0 90px '+GLOW.replace('1)','0.4)');
  targetEl.classList.add('visible');
}
function coordNext(){
  if(phase!=='running')return;
  if(targetsSeen>=TOTAL_TARGETS){endDrill();return}
  targetsSeen++;
  $('hReds')&&($('hReds').textContent=targetsSeen);
  coordRenderMoving();
  coordLive=true;
  // target stays for the window, then expires (miss, no penalty)
  coordWindow=setTimeout(function(){
    if(phase!=='running')return;
    coordLive=false;hideTarget();
    coordTimer=setTimeout(coordNext,180);   // brief gap, next target
  },COORD_WINDOW);
}
function stopCoord(){if(coordTimer){clearTimeout(coordTimer);coordTimer=null}if(coordWindow){clearTimeout(coordWindow);coordWindow=null}}

function clock(){
  // (legacy 5-minute timer — no longer used; go/no-go ends at 100 reds)
  return;
}

function showTarget(){
  var pad=70;
  targetX=pad+Math.random()*(innerWidth-pad*2);
  targetY=140+Math.random()*(innerHeight-230);
  targetEl.style.left=targetX+'px';targetEl.style.top=targetY+'px';
  targetEl.style.width=SIZE+'px';targetEl.style.height=SIZE+'px';
  targetInner.style.background='radial-gradient(circle at 35% 35%,'+COLOR+','+COLOR+'88)';
  targetInner.style.boxShadow='0 0 40px '+GLOW+',0 0 80px '+GLOW.replace('1)','0.4)');
  targetEl.classList.add('visible');
}
function hideTarget(){targetEl.classList.remove('visible')}
targetEl.addEventListener('pointerdown',function(e){e.preventDefault();handleTap()});

// beat-driven (80/100): each beat places a fresh target to tap in time
function spawnOnBeat(){
  if(phase!=='running')return;
  if(GO_NO_GO||COORD)return;   // those modes handle their own spawning; beat is ambiance
  showTarget();
}

// reaction-test (120): spaced targets, each with a short hit-window.
// (legacy spaced reaction-test removed; go/no-go and coord are the live modes)
var reactionTimer=null,windowTimer=null;
function stopReaction(){if(reactionTimer){clearTimeout(reactionTimer);reactionTimer=null}if(windowTimer){clearTimeout(windowTimer);windowTimer=null}}

/* ── GO / NO-GO (all tiers): one target, colors cycle at the tier's flash speed.
   RED is one of the colors. Tap on RED = score. Tap non-red = penalty.
   80/100: target MOVES each color change (coordination + reaction).
   120: target stays CENTERED (pure reaction).
   Game ends after TOTAL_REDS (100) reds have appeared. ── */
var GNG_NONRED=[
  {name:'blue',  c:'#2f7bff', g:'rgba(47,123,255,1)'},
  {name:'green', c:'#00D9A5', g:'rgba(0,217,165,1)'},
  {name:'orange',c:'#ff9500', g:'rgba(255,149,0,1)'},
  {name:'yellow',c:'#ffd60a', g:'rgba(255,214,10,1)'},
  {name:'purple',c:'#a855f7', g:'rgba(168,85,247,1)'}
];
var RED_COLOR={name:'red',c:'#ff1e3c',g:'rgba(255,30,60,1)',red:true};
var gngTimer=null, gngIsRed=false, misses=0, redsSeen=0;

// Red appears on a fully random, wandering chance — no fixed 1-in-N rate a kid
// could count. Red may repeat, cluster, or go quiet. Truly unpredictable.
function gngPickColor(){
  var chance=0.14+Math.random()*0.16;   // red probability wanders ~14%–30% each flash
  if(Math.random()<chance)return RED_COLOR;
  return GNG_NONRED[Math.floor(Math.random()*GNG_NONRED.length)];
}

function gngRender(col){
  var big;
  if(CENTERED){
    big=Math.min(innerWidth,innerHeight)*0.42;big=Math.max(160,Math.min(320,big));
    targetX=innerWidth/2;targetY=innerHeight/2;
  }else{
    // moving target: coordination — random position each color change
    big=Math.max(90,Math.min(150,Math.min(innerWidth,innerHeight)*0.20));
    var pad=big/2+20;
    targetX=pad+Math.random()*(innerWidth-pad*2);
    targetY=150+Math.random()*(innerHeight-230);
  }
  targetEl.style.left=targetX+'px';targetEl.style.top=targetY+'px';
  targetEl.style.width=big+'px';targetEl.style.height=big+'px';
  targetInner.style.background='radial-gradient(circle at 38% 35%,'+col.c+','+col.c+'aa)';
  targetInner.style.boxShadow='0 0 50px '+col.g+',0 0 100px '+col.g.replace('1)','0.4)');
  targetEl.classList.add('visible');
}

function goNoGoStart(){
  gngIsRed=false;redsSeen=0;
  $('gng-score-num').textContent='0';
  $('gng-score-num').classList.add('on');
  var rt=$('hRedTotal');if(rt)rt.textContent=TOTAL_REDS;
  var rl=$('hRedLabel');if(rl)rl.textContent='Reds';
  $('hReds')&&($('hReds').textContent='0');
  gngRender(GNG_NONRED[0]);          // start on a non-red
  startBeat();                       // beat pulse throbs underneath
  gngTimer=setInterval(gngCycle,FLASH_MS);   // colors change at the tier's flash speed
}
function gngCycle(){
  if(phase!=='running')return;
  var col=gngPickColor();            // fully random red chance — no countable pattern
  gngIsRed=!!col.red;
  gngRender(col);
  if(gngIsRed){
    redsSeen++;
    $('hReds')&&($('hReds').textContent=redsSeen);
    if(redsSeen>=TOTAL_REDS){        // 100 reds have appeared — end after this one shows briefly
      timers.push(setTimeout(function(){if(phase==='running')endDrill()},FLASH_MS));
    }
  }
}
function stopGoNoGo(){if(gngTimer){clearInterval(gngTimer);gngTimer=null}}

function handleTap(){
  if(phase!=='running')return;
  if(!targetEl.classList.contains('visible'))return;
  if(tapLocked)return;
  tapLocked=true;setTimeout(function(){tapLocked=false},60);

  if(COORD){
    if(!coordLive)return;
    coordLive=false;
    if(coordWindow){clearTimeout(coordWindow);coordWindow=null}
    taps++;
    var sc=$('gng-score-num');
    $('hTaps').textContent=taps;sc.textContent=taps;
    sc.style.transform='scale(1.35)';sc.style.color='#eafff6';
    setTimeout(function(){sc.style.transform='scale(1)';sc.style.color='#fff'},140);
    ripple(targetX,targetY);flash();
    hideTarget();
    coordTimer=setTimeout(coordNext,140);   // next target
    return;
  }

  if(GO_NO_GO){
    var sn=$('gng-score-num');
    if(gngIsRed){
      // GO — correct hit on red. Any red tap clears a hidden negative back to 0 first.
      if(taps<0)taps=0;
      taps++;
      $('hTaps').textContent=Math.max(0,taps);
      sn.textContent=Math.max(0,taps);
      sn.style.transform='scale(1.35)';sn.style.color='#eafff6';
      setTimeout(function(){sn.style.transform='scale(1)';sn.style.color='#fff'},140);
      ripple(targetX,targetY);flash();
      gngIsRed=false;               // consume this red so you can't double-tap the same flash
    }else{
      // NO-GO violation — tapped a non-red → penalty
      misses++;
      penaltyFlash();
      if(BUST_ON){
        taps=taps-1;                  // 120: can go negative, -3 ends the game
        if(taps<=-3){
          $('hTaps').textContent=Math.max(0,taps);
          msg('✗ NOT RED!','miss');
          endDrill();
          return;
        }
      }else{
        taps=Math.max(0,taps-1);      // 80/100: just lose a point, floored at 0
      }
      $('hTaps').textContent=Math.max(0,taps);
      sn.textContent=Math.max(0,taps);
      sn.style.transform='scale(.8)';sn.style.color='#ffd0d8';
      setTimeout(function(){sn.style.transform='scale(1)';sn.style.color='#fff'},200);
      msg('✗ NOT RED!','miss');
      timers.push(setTimeout(function(){if(phase==='running')msg('','go')},500));
    }
    return;
  }

  // (coord and go/no-go both return above; no other tap path)
}
function penaltyFlash(){var f=$('flash');f.style.background='rgba(255,20,90,.28)';f.style.opacity='1';setTimeout(function(){f.style.opacity='0'},160)}

function ripple(x,y){var r=document.createElement('div');r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';r.style.width='50px';r.style.height='50px';document.body.appendChild(r);setTimeout(function(){r.remove()},520)}
function flash(){var f=$('flash');f.style.background='rgba(0,217,165,.12)';f.style.opacity='1';setTimeout(function(){f.style.opacity='0'},100)}

function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){audioCtx=null}}
function beatTick(){
  if(audioCtx){try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=110;o.type='sine';g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.12,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.12);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.13)}catch(e){}}
  var bp=$('beat-pulse');bp.style.opacity='.5';setTimeout(function(){bp.style.opacity='.06'},90);
  spawnOnBeat();   // the beat brings the target — tap in time
}
function startBeat(){beatTick();beatTimer=setInterval(beatTick,60000/BEAT_BPM)}
function stopBeat(){if(beatTimer){clearInterval(beatTimer);beatTimer=null}var bp=$('beat-pulse');if(bp)bp.style.opacity='0'}

function endDrill(){
  if(phase==='done')return;
  phase='done';clrT();stopBeat();stopReaction();stopGoNoGo();stopCoord();hideTarget();
  var gs=$('gng-score-num');if(gs)gs.classList.remove('on');
  var finalScore=Math.max(0,taps);        // never save or show a negative
  var isNew=finalScore>best;
  if(isNew){best=finalScore;try{localStorage.setItem(BEST_KEY,String(best))}catch(e){}}
  submitScore(finalScore);
  $('endNum').textContent=finalScore;
  if(isNew&&finalScore>0){$('endHead').textContent='🎉 New Best!';$('endSub').textContent='You beat your record with '+finalScore+' taps. Amazing focus!'}
  else{$('endHead').textContent='Drill Complete!';$('endSub').textContent='Great focus. Play again and beat your number.'}
  $('screen-end').style.display='flex';
}

function submitScore(score){
  var token=localStorage.getItem('rct-token');
  if(!token||score<=0)return;   // saves only if logged in
  fetch(API+'/api/scores/game',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({game_id:GAME_ID,score:score,level:1,mode:'compete'})
  }).catch(function(e){console.error(e)});
}
window.addEventListener('beforeunload',function(){
  var token=localStorage.getItem('rct-token');
  if(token&&phase==='running'&&taps>0){
    navigator.sendBeacon(API+'/api/scores/game',JSON.stringify({game_id:GAME_ID,score:taps,level:1,mode:'compete'}));
  }
});
</script>
</body>
</html>
