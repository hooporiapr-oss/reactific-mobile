<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VR Pattern Recognition | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}

#screen-intro{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  background:radial-gradient(ellipse at center,#140800 0%,#000 70%);z-index:100;
  overflow-y:auto;overflow-x:hidden;
  padding:20px 16px 24px;
  box-sizing:border-box;
}
.vrr-logo{font-size:2.4rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1;color:#fff;text-shadow:0 0 60px rgba(255,107,53,1);margin-bottom:8px}
.vrr-logo span{color:#FF6B35}
.vrr-sub{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:#FF6B35;margin-bottom:8px;text-align:center}
.vrr-rule{font-size:.9rem;color:#ffd35a;font-weight:900;letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;text-align:center}
.big-btn{width:100%;max-width:420px;height:68px;border:none;border-radius:20px;background:linear-gradient(135deg,#FF6B35,#ff8a5c);color:#fff;font-size:1.2rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 40px rgba(255,107,53,.7);margin-bottom:14px}
.big-btn:hover{transform:scale(1.03)}
.speed-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;width:100%;max-width:420px}
.speed-btn{width:100%;min-width:0;height:58px;border:3px solid rgba(255,107,53,.4);background:rgba(255,107,53,.08);border-radius:14px;color:#fff;font-size:.9rem;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;padding:4px 2px}
.speed-btn.active{border-color:#FF6B35;background:rgba(255,107,53,.22);box-shadow:0 0 30px rgba(255,107,53,.6);color:#FF6B35}
.speed-btn small{display:block;font-size:.58rem;color:#a7adba;letter-spacing:.02em;white-space:normal;line-height:1.2}
.sel-row{display:flex;gap:20px;margin-bottom:14px;align-items:flex-start;justify-content:center}
.sel-group{display:flex;flex-direction:column;align-items:center;gap:6px}
.sel-label{color:#ffd35a;font-size:.65rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
.sel-btns{display:flex;gap:6px}
.sel-btn{min-width:60px;height:48px;border:2px solid rgba(255,107,53,.4);background:rgba(255,107,53,.08);border-radius:10px;color:#fff;font-size:.8rem;font-weight:900;cursor:pointer;text-transform:uppercase}
.sel-btn strong{display:block;font-size:1rem;line-height:1}
.sel-btn small{font-size:.5rem;color:#a7adba}
.sel-btn.active{border-color:#FF6B35;background:rgba(255,107,53,.22);color:#FF6B35;box-shadow:0 0 14px rgba(255,107,53,.5)}
.intro-info{font-size:.75rem;color:#8892a0;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1.8;width:100%;max-width:420px}
.intro-info strong{color:#ffd35a}

@media (max-width:420px){
  #screen-intro{padding:16px 12px 20px}
  .vrr-logo{font-size:1.8rem}
  .vrr-sub{font-size:.62rem;margin-bottom:6px}
  .vrr-rule{font-size:.7rem;margin-bottom:14px}
  .speed-row{gap:5px}
  .speed-btn{height:50px;font-size:.78rem}
  .speed-btn small{font-size:.5rem}
  .big-btn{height:56px;font-size:1rem;margin-bottom:10px}
  .intro-info{font-size:.62rem;line-height:1.6}
}

#screen-game{
  position:fixed;inset:0;display:none;flex-direction:column;
  background:radial-gradient(circle at 16% 5%,rgba(255,107,53,.15),transparent 30%),linear-gradient(180deg,#0a0300,#050100);
}
.topbar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:10px;padding:6px 10px 4px;flex-shrink:0}
.top-box{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;padding:4px 6px;background:rgba(0,0,0,.4);border:2px solid rgba(255,107,53,.3)}
.top-label{font-size:.5rem;color:#FF6B35;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.top-val{font-size:1.3rem;font-weight:900;line-height:1;color:#fff}
.info-box{border-color:#ffd35a;background:rgba(255,215,0,.06)!important}
.info-box .top-label{color:#ffd35a}
.info-box .top-val{color:#FF6B35;font-size:1rem}
.clockbar{height:6px;background:rgba(255,255,255,.08);flex-shrink:0;overflow:hidden}
.clockbar-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#ffd35a);transition:width .1s linear}
.msg-bar{text-align:center;font-size:1.1rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;min-height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 10px}
.msg-bar.watch{color:#ffd35a}.msg-bar.go{color:#FF6B35}.msg-bar.perfect{color:#00D9A5}.msg-bar.miss{color:#FF1493}
.stars{display:flex;gap:8px;justify-content:center;align-items:center;flex-shrink:0;padding:2px 0}
.star{font-size:1rem;opacity:.2;transition:all .3s}
.star.earned{opacity:1;filter:drop-shadow(0 0 6px #FF6B35);transform:scale(1.2)}
.court-area{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 8px;min-height:0;perspective:800px}
.court{display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(5,1fr);gap:4px;width:100%;height:100%;max-height:100%;transform:rotateX(6deg);transform-origin:center bottom;border:2px solid rgba(255,107,53,.25);border-radius:14px;padding:6px;background:rgba(10,3,0,.85);box-shadow:0 0 60px rgba(255,107,53,.2),inset 0 0 40px rgba(255,107,53,.04),0 20px 60px rgba(0,0,0,.8)}
.court.strobe-soft{filter:brightness(.62) contrast(1.08)}
.court.strobe-medium{filter:brightness(.42) contrast(1.15)}
.court.strobe-hard{opacity:.18}
.cell{border-radius:8px;background:rgba(255,107,53,.08);border:2px solid rgba(255,107,53,.4);display:flex;align-items:center;justify-content:center;font-size:clamp(1.4rem,3vw,3rem);font-weight:900;color:transparent;cursor:pointer;transition:all .08s;touch-action:manipulation}
.cell:hover{background:rgba(255,107,53,.2);border-color:#FF6B35;transform:scale(1.05)}
.cell.lit{background:#FF6B35!important;border-color:#ffd35a!important;box-shadow:0 0 20px rgba(255,107,53,.9)!important;color:#fff!important;transform:scale(1.05)}
.cell.correct{background:#00D9A5!important;border-color:#00D9A5!important;box-shadow:0 0 16px rgba(0,217,165,.7)!important;color:#fff!important}
.cell.wrong{background:rgba(255,20,147,.35)!important;border-color:#FF1493!important;animation:shake .3s}
.cell.reveal{background:#FF6B35!important;border-color:#ffd35a!important;color:#fff!important;opacity:.5}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.bottombar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:4px 10px 6px;gap:8px;flex-shrink:0}
.bot-btn{height:48px;border:2px solid rgba(255,107,53,.5);background:rgba(0,0,0,.4);border-radius:12px;color:#fff;font-size:1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.bot-btn span{display:block;color:#FF6B35;font-size:.55rem;margin-top:1px}
.start-btn{border-color:#FF6B35;background:linear-gradient(180deg,#ff8a5c,#FF6B35);font-size:1.1rem;box-shadow:0 0 18px rgba(255,107,53,.7)}
.start-btn:disabled{opacity:.5}

@media (max-width:768px){
  .bottombar{grid-template-columns:1fr 1fr 1fr}
  #fsBtn{display:none}
}
</style>
</head>
<body>

<div id="screen-intro">
  <a style="display:inline-block;margin-bottom:18px;padding:10px 20px;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:#fff;font-size:.85rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;cursor:pointer;text-decoration:none;align-self:flex-start" href="/vr-home.html">← Games</a>
  <div class="vrr-logo">PATTERN <span>RECOGNITION</span></div>
  <div class="vrr-sub">5×10 VR Court · Reactific™</div>
  <div class="vrr-rule">🧩 MEMORIZE THE PATTERN — TAP IT BACK</div>
  <div class="speed-row">
    <button class="speed-btn" data-mult="1.4">EASY<small>MORE TIME</small></button>
    <button class="speed-btn active" data-mult="1.0">TEMPO<small>BALANCED</small></button>
    <button class="speed-btn" data-mult="0.65">ELITE<small>LESS TIME</small></button>
  </div>
  <button class="big-btn" id="startBtn">▶ ENTER THE COURT</button>
  <div class="intro-info">
    <strong>WATCH</strong> — numbered cells light up<br>
    <strong>REMEMBER</strong> — positions go dark<br>
    <strong>TAP</strong> — recall them in order: 1, 2, 3...<br>
    <strong>3 PERFECT</strong> — level up
  </div>
</div>

<div id="screen-game">
  <div class="topbar">
    <div class="top-box"><div class="top-label">Score</div><div class="top-val" id="hSc">0</div></div>
    <div class="top-box info-box"><div class="top-label">Memorize</div><div class="top-val" id="hFind">5 cells</div></div>
    <div class="top-box"><div class="top-label">Round</div><div class="top-val" id="hRd">0</div></div>
    <div class="top-box"><div class="top-label">Level</div><div class="top-val" id="hLv">1</div></div>
    <div class="top-box"><div class="top-label">Streak</div><div class="top-val" id="hSt">0</div></div>
    <div class="top-box"><div class="top-label">Level Up</div><div class="top-val" id="hPf">0/1</div></div>
  </div>
  <div class="clockbar"><div class="clockbar-fill" id="clockFill" style="width:0%"></div></div>
  <div class="msg-bar watch" id="msg">TAP LET'S GO!</div>
  <div class="stars"><span style="font-size:.65rem;color:#8892a0;letter-spacing:.1em;text-transform:uppercase">Level</span>&nbsp;<span id="ps1" style="font-size:1.2rem;font-weight:900;color:#FF6B35"></span></div>
  <div class="court-area"><div class="court" id="court"></div></div>
  <div class="bottombar">
    <button class="bot-btn" id="menuBtn">← Home<span>Settings</span></button>
    <button class="bot-btn start-btn" id="actBtn">LET'S GO</button>
    <button class="bot-btn" id="restartBtn" style="display:none;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);color:#8892a0;font-size:.8rem" onclick="restartGame()">↺ Restart<span style="color:#555">Level 1</span></button>
    <button class="bot-btn" id="fsBtn">Fullscreen<span>Toggle</span></button>
  </div>
</div>

<script>
(function(){
var $=id=>document.getElementById(id);
var speedMult=1.0,bpm=90,strobe='soft',strobeTimer=null;
var BASE_MS_PER_CELL=400; // ms per cell at Tempo — scales with difficulty

function getDisplayTime(){return Math.round(BASE_MS_PER_CELL*gcc()*speedMult)}

document.querySelectorAll('[data-mult]').forEach(btn=>{btn.onclick=function(){speedMult=Number(btn.dataset.mult);document.querySelectorAll('[data-mult]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}});
document.querySelectorAll('[data-bpm]').forEach(btn=>{btn.onclick=function(){bpm=Number(btn.dataset.bpm);document.querySelectorAll('[data-bpm]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}});
document.querySelectorAll('[data-strobe]').forEach(btn=>{btn.onclick=function(){strobe=btn.dataset.strobe;document.querySelectorAll('[data-strobe]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}});

function stopStrobe(){if(strobeTimer){clearInterval(strobeTimer);strobeTimer=null}var c=$('court');if(c)c.classList.remove('strobe-soft','strobe-medium','strobe-hard')}
function startStrobe(){stopStrobe();if(strobe==='off')return;var c=$('court');var cls=strobe==='soft'?'strobe-soft':strobe==='medium'?'strobe-medium':'strobe-hard';var beat=60000/bpm;var flash=Math.max(80,Math.min(170,beat*.25));strobeTimer=setInterval(function(){c.classList.add(cls);setTimeout(function(){c.classList.remove(cls)},flash)},beat)}

$('startBtn').onclick=function(){$('screen-intro').style.display='none';$('screen-game').style.display='flex';buildCourt();updateHUD()};
$('menuBtn').onclick=function(){stopStrobe();$('screen-game').style.display='none';$('screen-intro').style.display='flex'};
$('fsBtn').onclick=async function(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){}};

var cells=[];
function buildCourt(){var court=$('court');court.innerHTML='';cells=[];for(var i=0;i<50;i++){var c=document.createElement('div');c.className='cell';c.dataset.i=i;c.addEventListener('pointerdown',(function(idx){return function(e){e.preventDefault();handleTap(idx)}})(i));court.appendChild(c);cells.push(c)}}
function cellSt(i,st,num){cells[i].className='cell';cells[i].textContent='';cells[i].style.color='transparent';if(st){cells[i].classList.add(st);if(num!==undefined){cells[i].textContent=num;cells[i].style.color='#fff'}}}
function resetCells(){cells.forEach((_,i)=>cellSt(i))}

var LEVEL_CELLS={1:5,2:6,3:7,4:8,5:10,6:12,7:14,8:16,9:18,10:20};
var g={lv:1,sc:0,rd:0,st:0,pf:0};
function gcc(){return LEVEL_CELLS[g.lv]||5}
function updateHUD(){$('hSc').textContent=g.sc;$('hRd').textContent=g.rd;$('hLv').textContent=g.lv;$('hSt').textContent=g.st;$('hPf').textContent=g.pf+'/1';$('hFind').textContent=gcc()+' cells';$('ps1').textContent=g.lv}
function msg(txt,cls){var el=$('msg');el.textContent=txt;el.className='msg-bar '+(cls||'watch')}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}

// ── SCORE SUBMISSION ──────────────────────────────────
var API='https://api.reactificgaming.com';
(function(){
  var urlToken=new URLSearchParams(window.location.search).get('t');
  if(urlToken)localStorage.setItem('rct-token',urlToken);
})();

function submitScore(score,level,mode){
  var token=localStorage.getItem('rct-token');
  if(!token)return;
  fetch(API+'/api/scores/game',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({game_id:'pattern',score:score,level:level,mode:mode})
  }).catch(function(err){
    console.error('Score submit error:',err);
  });
}

// Ensure score is saved when leaving
window.addEventListener('beforeunload',function(){
  var token=localStorage.getItem('rct-token');
  if(token && g && g.sc>0){
    navigator.sendBeacon(API+'/api/scores/game',
      JSON.stringify({game_id:'pattern',score:g.sc,level:g.lv,mode:'progression'})
    );
  }
});

var phase='idle',pattern=[],playerIdx=0,timers=[];
function clrT(){timers.forEach(clearTimeout);timers=[]}

function startRound(){
  if(phase!=='idle')return;
  clrT();phase='showing';g.rd++;playerIdx=0;
  resetCells();stopStrobe();$('actBtn').disabled=true;$('restartBtn').style.display='none';updateHUD();
  $('clockFill').style.width='100%';
  var indices=shuffle(Array.from({length:50},(_,i)=>i)).slice(0,gcc());
  pattern=indices;
  $('hFind').textContent=gcc()+' cells';
  msg('MEMORIZE! ('+((getDisplayTime()/1000).toFixed(1))+'s)','watch');
  timers.push(setTimeout(function(){
    pattern.forEach(function(idx,n){cellSt(idx,'lit',n+1)});
    timers.push(setTimeout(function(){
      pattern.forEach(function(idx){cellSt(idx)});
      msg('TAP IN ORDER!','go');
      phase='tapping';
      startStrobe();
    },getDisplayTime()));
  },600));
}

var tapLocked=false;
function handleTap(idx){
  if(phase!=='tapping')return;
  if(tapLocked)return;
  tapLocked=true;
  setTimeout(function(){tapLocked=false},80);
  if(idx===pattern[playerIdx]){
    cellSt(idx,'correct',playerIdx+1);playerIdx++;
    if(playerIdx>=pattern.length){
      phase='idle';clrT();stopStrobe();
      g.sc+=gcc()*20;g.st++;g.pf++;updateHUD();
      msg('✅ PERFECT!','perfect');
      if(g.pf>=1){
        timers.push(setTimeout(function(){
          if(g.lv<10){
            g.lv++;
            g.pf=0;
            submitScore(g.sc,g.lv,'progression');  // FIXED: Submit on level up
          }
          updateHUD();
          resetCells();
          msg('🔥 LEVEL UP!','perfect');
          timers.push(setTimeout(autoNextRound,900))
        },1200))
      }else{
        submitScore(g.sc,g.lv,'progression');  // FIXED: Submit on success
        timers.push(setTimeout(autoNextRound,1000))
      }
    }
  }else{
    phase='idle';clrT();stopStrobe();
    cellSt(idx,'wrong');g.st=0;g.pf=0;updateHUD();
    msg('WRONG ORDER!','miss');
    submitScore(g.sc,g.lv,'progression');
    timers.push(setTimeout(function(){pattern.forEach(function(pi,n){cellSt(pi,'reveal',n+1)});timers.push(setTimeout(showMissOptions,1800))},500));
  }
}

function autoNextRound(){if(phase!=='idle')return;resetCells();$('clockFill').style.width='0%';$('actBtn').disabled=true;$('restartBtn').style.display='none';startRound()}
function showMissOptions(){phase='idle';clrT();resetCells();updateHUD();$('clockFill').style.width='0%';
  msg("TRY AGAIN",'miss');
  $('actBtn').textContent="TRY AGAIN";$('actBtn').onclick=function(){$('restartBtn').style.display='none';startRound()};$('actBtn').disabled=false;
  $('restartBtn').style.display='';
}
function restartGame(){clrT();phase='idle';stopStrobe();g={lv:1,sc:0,rd:0,st:0,pf:0};resetCells();updateHUD();$('clockFill').style.width='0%';msg("TAP LET'S GO!",'watch');$('actBtn').textContent="LET'S GO";$('actBtn').onclick=startRound;$('actBtn').disabled=false;$('restartBtn').style.display='none'}
$('actBtn').onclick=startRound;
buildCourt();
})();
</script>
</body>
</html>
