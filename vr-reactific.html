<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reactific Sport | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden}

body{
  display:flex;flex-direction:column;
  background:radial-gradient(ellipse at center,#0e0018 0%,#000 70%);
  height:100vh;padding:12px;
}

#header{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:8px;border-bottom:2px solid rgba(155,89,182,.2);
  margin-bottom:12px;flex-shrink:0;gap:16px;
}

.logo{font-size:1.4rem;font-weight:900;font-style:italic;letter-spacing:.08em;text-transform:uppercase;color:#fff;text-shadow:0 0 40px rgba(155,89,182,.8)}
.logo span{color:#9B59B6}

#hud{display:flex;gap:16px;font-size:.7rem;font-weight:900;text-transform:uppercase}
.hud-item{background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.2);border-radius:6px;padding:6px 12px}
.hud-val{color:#9B59B6;font-size:.9rem}

#gameContainer{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden}

#msg{font-size:1.2rem;font-weight:900;color:#9B59B6;text-shadow:0 0 20px rgba(155,89,182,.6);height:28px}
#msg.miss{color:#FF1493}

#grid{
  display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(5,1fr);
  gap:6px;width:100%;height:100%;
  background:rgba(0,0,0,.3);border:2px solid #9B59B6;border-radius:12px;padding:8px;
  box-sizing:border-box;box-shadow:0 0 40px rgba(155,89,182,.3);
}

.cell{
  background:rgba(155,89,182,.08);border:1px solid rgba(155,89,182,.2);border-radius:6px;
  cursor:pointer;transition:all .05s;user-select:none;
}

.cell.active{background:#9B59B6;border-color:#9B59B6;box-shadow:0 0 30px rgba(155,89,182,.8)}
.cell.correct{background:#00D9A5;border-color:#00D9A5}
.cell.wrong{background:#FF1493;border-color:#FF1493}
.cell.missed{background:#333;border-color:#333}

#stats{display:flex;gap:24px;justify-content:center;font-size:.8rem;font-weight:900;text-transform:uppercase;flex-shrink:0}
.stat{text-align:center}
.stat-label{color:#8892a0;font-size:.65rem;margin-bottom:3px}
.stat-val{color:#9B59B6;font-size:1.1rem}

#controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;flex-shrink:0}
.btn{padding:10px 20px;background:rgba(155,89,182,.2);border:2px solid rgba(155,89,182,.3);
  color:#9B59B6;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:900;
  text-transform:uppercase;transition:all .2s}
.btn:hover{background:rgba(155,89,182,.35)}
.btn-play{background:linear-gradient(135deg,#9B59B6,#A873B8);border:none;color:#fff;box-shadow:0 0 30px rgba(155,89,182,.6)}
.btn-play:hover{box-shadow:0 0 50px rgba(155,89,182,.9)}
</style>
</head>
<body>

<div id="header">
  <div class="logo">REACTIFIC<span>™</span></div>
  <div id="hud">
    <div class="hud-item">BPM: <span class="hud-val" id="bpmVal">40</span></div>
    <div class="hud-item">TAPS: <span class="hud-val" id="tapsVal">0</span></div>
    <div class="hud-item">SCORE: <span class="hud-val" id="scoreVal">0</span></div>
  </div>
</div>

<div id="gameContainer">
  <div id="msg"></div>
  <div id="grid"></div>
  <div id="stats">
    <div class="stat">
      <div class="stat-label">Tier</div>
      <div class="stat-val" id="tierDisplay">Rookie</div>
    </div>
    <div class="stat">
      <div class="stat-label">Accuracy</div>
      <div class="stat-val" id="accuracyDisplay">100%</div>
    </div>
    <div class="stat">
      <div class="stat-label">Streak</div>
      <div class="stat-val" id="streakDisplay">0</div>
    </div>
  </div>
</div>

<div id="controls">
  <button class="btn btn-play" id="playBtn" onclick="startGame()">🏆 Start Match</button>
  <button class="btn" onclick="goToGames()">⊞ Games</button>
</div>

<script src="/challenge-utils.js"></script>
<script>
var $=function(id){return document.getElementById(id)};
var API='https://api.reactificgaming.com';
var token=localStorage.getItem('rct-token');
var challengeLevel=new URLSearchParams(window.location.search).get('challenge');
var challengeMode=challengeLevel?true:false;

var SPEEDS=[
  {bpm:40,ms:1500,pts:10,tier:'Rookie',color:'#9B59B6'},
  {bpm:60,ms:1000,pts:20,tier:'Varsity',color:'#00BFFF'},
  {bpm:80,ms:750,pts:40,tier:'Elite',color:'#00D9A5'},
  {bpm:100,ms:600,pts:70,tier:'Pro',color:'#ff6b00'},
  {bpm:120,ms:500,pts:100,tier:'Champion',color:'#FF1493'}
];

var g={taps:0,correct:0,score:0,streak:0,speedIdx:0};
var phase='idle';
var currentTargetIdx=-1;
var timers=[];
var cells=[];

function initGrid(){
  var grid=$('grid');
  grid.innerHTML='';
  cells=[];
  for(var i=0;i<50;i++){
    var cell=document.createElement('div');
    cell.className='cell';
    cell.onclick=function(){handleTap(cells.indexOf(this))};
    grid.appendChild(cell);
    cells.push(cell);
  }
}

function clearTimers(){
  timers.forEach(function(t){clearTimeout(t)});
  timers=[];
}

function updateHUD(){
  $('bpmVal').textContent=SPEEDS[g.speedIdx].bpm;
  $('tapsVal').textContent=g.taps;
  $('scoreVal').textContent=g.score;
  $('tierDisplay').textContent=SPEEDS[g.speedIdx].tier;
  var acc=g.taps>0?Math.round((g.correct/g.taps)*100):100;
  $('accuracyDisplay').textContent=acc+'%';
  $('streakDisplay').textContent=g.streak;
}

function showMsg(txt,type){
  var msg=$('msg');
  msg.textContent=txt;
  msg.className='';
  if(type)msg.classList.add(type);
}

function fireCell(){
  if(phase!=='playing')return;
  if(currentTargetIdx>=0)cells[currentTargetIdx].className='cell';
  currentTargetIdx=Math.floor(Math.random()*50);
  var speed=SPEEDS[g.speedIdx];
  cells[currentTargetIdx].className='cell active';
  cells[currentTargetIdx].style.background=speed.color;
  timers.push(setTimeout(function(){
    if(phase==='playing'&&currentTargetIdx>=0)onMiss();
  },speed.ms));
}

function handleTap(idx){
  if(phase!=='playing')return;
  var speed=SPEEDS[g.speedIdx];
  if(idx===currentTargetIdx){
    g.taps++;
    g.correct++;
    g.score+=speed.pts;
    g.streak++;
    cells[idx].className='cell correct';
    showMsg('✓ +'+speed.pts);
    updateHUD();
    if(g.taps%20===0&&g.speedIdx<SPEEDS.length-1){
      g.speedIdx++;
      showMsg('🔥 '+SPEEDS[g.speedIdx].bpm+' BPM!');
      updateHUD();
      timers.push(setTimeout(fireCell,600));
    }else{
      timers.push(setTimeout(fireCell,150));
    }
  }else{
    cells[idx].className='cell wrong';
    onMiss();
  }
}

function onMiss(){
  if(phase==='idle')return;
  phase='idle';
  clearTimers();
  showMsg('GAME OVER · '+g.taps+' TAPS · '+g.score+' PTS','miss');
  submitScore();
  timers.push(setTimeout(finishGame,1800));
}

function finishGame(){
  phase='idle';
  clearTimers();
  cells.forEach(function(c){c.className='cell';c.style.background=''});
  currentTargetIdx=-1;
  if(challengeMode){
    var score=g.score;
    setTimeout(function(){onChallengeGameEnd(score,'reactific',false)},800);
    return;
  }
  g={taps:0,correct:0,score:0,streak:0,speedIdx:0};
  updateHUD();
  showMsg('');
  $('playBtn').disabled=false;
}

function startGame(){
  if(phase==='playing')return;
  phase='playing';
  g={taps:0,correct:0,score:0,streak:0,speedIdx:0};
  updateHUD();
  showMsg('GET SET...');
  $('playBtn').disabled=true;
  timers.push(setTimeout(function(){showMsg('GO!');fireCell()},800));
}

function submitScore(){
  if(!token)return;
  var mode=challengeMode?'challenge-'+challengeLevel+'-game':'championship';
  fetch(API+'/api/scores/game',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({game_id:'reactific',score:g.score,level:5,mode:mode})
  }).catch(function(e){console.error('Error:',e)});
}

function onChallengeGameEnd(score,gameName,wasSuccessful){
  if(!ChallengeMode.isActive())return;
  ChallengeMode.addScore(score);
  if(ChallengeMode.isLastGame()){
    sessionStorage.setItem('challenge-final-score',ChallengeMode.getTotalScore());
    window.location.href='/challenge-complete.html';
  }else{
    ChallengeMode.advanceGame();
    var nextGame=ChallengeMode.getNextGame();
    if(nextGame){
      var urls={echo:'/vr-echo.html',pattern:'/vr-pattern.html',numhunt:'/vr-numhunt.html',reaction:'/vr-reaction.html',bonus:'/vr-reactific.html'};
      window.location.href=(urls[nextGame.id]||'/vr-echo.html')+'?challenge='+ChallengeMode.getLevel();
    }
  }
}

function goToGames(){
  if(challengeMode)window.location.href='/challenge.html?level='+challengeLevel;
  else window.location.href='/vr-lab.html';
}

initGrid();
updateHUD();
</script>

</body>
</html>
