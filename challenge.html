<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge Mode | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at center,#0e0018 0%,#000 70%);
  height:100vh;
  padding:20px;
}

.container{text-align:center;max-width:500px}

.logo{font-size:2.2rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;color:#fff;text-shadow:0 0 40px rgba(155,89,182,.8);margin-bottom:20px}
.logo span{color:#ffd35a}

.challenge-title{font-size:1.6rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#9B59B6;margin-bottom:16px}

.game-sequence{
  background:rgba(155,89,182,.1);
  border:2px solid rgba(155,89,182,.3);
  border-radius:12px;
  padding:24px;
  margin-bottom:24px;
}

.sequence-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#8892a0;margin-bottom:12px}

.games-list{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}

.game-pill{
  background:rgba(155,89,182,.2);
  border:1px solid rgba(155,89,182,.3);
  color:#9B59B6;
  padding:8px 12px;
  border-radius:20px;
  font-size:.75rem;
  font-weight:900;
  text-transform:uppercase;
}

.game-pill.active{
  background:#9B59B6;
  color:#fff;
  border-color:#9B59B6;
  box-shadow:0 0 20px rgba(155,89,182,.6);
}

.rules{
  background:rgba(0,150,136,.1);
  border:1px solid rgba(0,150,136,.2);
  border-radius:8px;
  padding:16px;
  margin-bottom:24px;
  font-size:.75rem;
  line-height:1.6;
  color:#8892a0;
}

.rules-title{
  font-weight:900;
  color:#00D9A5;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.start-btn{
  padding:16px 40px;
  background:linear-gradient(135deg,#ffd35a,#b8860b);
  border:none;
  border-radius:12px;
  color:#000;
  font-size:1.1rem;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 0 40px rgba(255,211,90,.6);
  transition:all .2s;
}

.start-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 60px rgba(255,211,90,1);
}

.game-over{display:none}

.game-over.show{display:block}

.game-over-content{
  background:linear-gradient(135deg,rgba(255,20,147,.15),rgba(155,89,182,.15));
  border:2px solid #FF1493;
  border-radius:16px;
  padding:32px 24px;
  text-align:center;
}

.game-over-title{
  font-size:1.4rem;
  font-weight:900;
  color:#FF1493;
  margin-bottom:16px;
  text-transform:uppercase;
  letter-spacing:.1em;
}

.failed-on{
  font-size:.9rem;
  color:#ffd35a;
  margin-bottom:20px;
  font-weight:600;
}

.final-score{
  font-size:2.4rem;
  font-weight:900;
  color:#00D9A5;
  margin-bottom:12px;
}

.score-label{
  font-size:.75rem;
  color:#8892a0;
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:24px;
}

.buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

.btn{
  padding:12px 24px;
  border:none;
  border-radius:10px;
  font-size:.85rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  text-decoration:none;
  transition:all .2s;
}

.btn-retry{
  background:rgba(155,89,182,.2);
  border:2px solid rgba(155,89,182,.3);
  color:#9B59B6;
}
.btn-retry:hover{background:rgba(155,89,182,.35);border-color:#9B59B6}

.btn-menu{
  background:rgba(0,150,136,.2);
  border:2px solid rgba(0,150,136,.3);
  color:#00D9A5;
}
.btn-menu:hover{background:rgba(0,150,136,.35);border-color:#00D9A5}

@media (max-width:640px){
  .logo{font-size:1.6rem}
  .challenge-title{font-size:1.2rem}
  .games-list{gap:6px}
  .game-pill{padding:6px 10px;font-size:.65rem}
}
</style>
</head>
<body>

<div class="container">
  <!-- CHALLENGE START SCREEN -->
  <div id="challenge-start">
    <div class="logo">CHALLENGE<span>MODE</span></div>
    <div class="challenge-title" id="title">Loading...</div>

    <div class="game-sequence">
      <div class="sequence-label">Game Sequence</div>
      <div class="games-list" id="games-list"></div>
    </div>

    <div class="rules">
      <div class="rules-title">⚡ Rules</div>
      <div>Play through each game in order. A single miss ANYWHERE = Game Over. Complete all games to post your score to the leaderboard.</div>
    </div>

    <button class="start-btn" onclick="startChallenge()">🏆 Begin Challenge</button>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="challenge-gameover" class="game-over">
    <div class="game-over-content">
      <div class="game-over-title">Game Over</div>
      <div class="failed-on" id="failed-on">Failed on Reactific Sport</div>
      <div class="final-score" id="final-score">1,250</div>
      <div class="score-label">Challenge Score</div>
      <div class="buttons">
        <button class="btn btn-retry" onclick="retryChallenge()">🔄 Retry</button>
        <a class="btn btn-menu" href="/challenge-select.html">⊞ Challenges</a>
      </div>
    </div>
  </div>
</div>

<script>
var API='https://api.reactificgaming.com';
var token=localStorage.getItem('rct-token');
var user=JSON.parse(localStorage.getItem('rct-user')||'null');

var CHALLENGE_GAMES=[
  {id:'reactific', name:'Reactific Sport', icon:'⚡'},
  {id:'echo', name:'Echo Recall', icon:'🧠'},
  {id:'pattern', name:'Pattern Rec', icon:'🎨'},
  {id:'numhunt', name:'Number Hunt', icon:'🔢'},
  {id:'reaction', name:'Reaction Plus', icon:'⚡'},
  {id:'bonus', name:'Bonus Round', icon:'🏆'}
];

var urlParams=new URLSearchParams(window.location.search);
var level=parseInt(urlParams.get('level'))||1;
var challengeGames=CHALLENGE_GAMES.slice(0,level);
var currentGameIdx=0;
var totalScore=0;

function initChallenge(){
  var title='Challenge '+level;
  if(level===6) title='🏆 6-Game Gauntlet';
  document.getElementById('title').textContent=title;

  var gamesList='';
  challengeGames.forEach(function(g,i){
    gamesList+='<div class="game-pill '+(i===0?'active':'')+' ">'+g.icon+' '+g.name+'</div>';
  });
  document.getElementById('games-list').innerHTML=gamesList;

  sessionStorage.setItem('challenge-level',level);
  sessionStorage.setItem('challenge-games',JSON.stringify(challengeGames));
  sessionStorage.setItem('challenge-score',0);
  sessionStorage.setItem('challenge-idx',0);
  sessionStorage.setItem('challenge-scores','{}');
}

function startChallenge(){
  // Initialize challenge in sessionStorage
  sessionStorage.setItem('challenge-active','1');
  sessionStorage.setItem('challenge-level',level);
  sessionStorage.setItem('challenge-games',JSON.stringify(challengeGames));
  sessionStorage.setItem('challenge-score',0);
  sessionStorage.setItem('challenge-idx',0);
  
  // Build URL for first game (always Reactific)
  var gameUrls={
    'reactific':'/vr-reactific.html',
    'echo':'/vr-echo.html',
    'pattern':'/vr-pattern.html',
    'numhunt':'/vr-numhunt.html',
    'reaction':'/vr-reaction.html',
    'bonus':'/vr-reactific.html'
  };
  var firstGame=challengeGames[0];
  var firstGameUrl=gameUrls[firstGame.id]||'/vr-reactific.html';
  
  window.location.href=firstGameUrl+'?challenge='+level;
}

function retryChallenge(){
  document.getElementById('challenge-start').style.display='block';
  document.getElementById('challenge-gameover').classList.remove('show');
  sessionStorage.removeItem('challenge-active');
  sessionStorage.removeItem('challenge-score');
  sessionStorage.removeItem('challenge-idx');
  sessionStorage.removeItem('challenge-scores');
  sessionStorage.removeItem('challenge-gameover');
}

function showGameOver(failedGame, score){
  totalScore=score;
  document.getElementById('challenge-start').style.display='none';
  document.getElementById('challenge-gameover').classList.add('show');
  document.getElementById('failed-on').textContent='Failed on '+failedGame;
  document.getElementById('final-score').textContent=score.toLocaleString();
}

// Check if returning from game over
if(sessionStorage.getItem('challenge-gameover')){
  var failedGame=sessionStorage.getItem('challenge-failed-game');
  var score=parseInt(sessionStorage.getItem('challenge-final-score'))||0;
  var completed=sessionStorage.getItem('challenge-completed')==='1';
  
  showGameOver(failedGame,score);
  
  // Submit score if completed and logged in
  if(completed && token){
    var mode='challenge-'+level+'-game';
    fetch(API+'/api/scores/game',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({game_id:'challenge',score:score,level:1,mode:mode})
    }).catch(function(err){console.error('Challenge score submit:',err)});
  }
  
  sessionStorage.removeItem('challenge-gameover');
}

initChallenge();
</script>

</body>
</html>
