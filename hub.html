<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reactific Student Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0B1F3A 0%, #1a3a52 100%); color: #333; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,.1); }
    .header h1 { color: #fff; font-size: 2rem; }
    .header-info { display: flex; gap: 20px; align-items: center; }
    #uname { color: #fff; font-size: 1rem; }
    .btn-signout { padding: 10px 20px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 8px; cursor: pointer; }
    .btn-signout:hover { background: rgba(255,255,255,.2); }
    .join-class { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 24px; margin-bottom: 32px; backdrop-filter: blur(10px); }
    .field-label { color: #8892a0; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
    .input { width: 100%; max-width: 300px; padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.08); color: #333; font-size: 1rem; margin-bottom: 16px; }
    .btn { padding: 12px 32px; background: linear-gradient(135deg, #008CFF 0%, #0066cc 100%); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,140,255,.3); }
    .error { color: #c53030; font-size: 0.9rem; margin-top: 8px; }
    .section-title { color: #fff; font-size: 1.5rem; font-weight: 600; margin: 32px 0 20px 0; }
    #my-class-wrap { padding: 16px; background: rgba(0,150,255,.1); border-radius: 8px; border: 1px solid rgba(0,150,255,.2); color: #8892a0; }
    #leaderboards-wrap { color: #8892a0; }
    .empty-state { text-align: center; padding: 40px; color: #8892a0; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,.2); border-top: 3px solid #008CFF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>REACTIFIC™</h1>
    <div class="header-info">
      <div id="uname">Student</div>
      <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="join-class">
    <div class="field-label">Join Your Class</div>
    <input class="input" id="class-code" placeholder="ABC123" maxlength="6" style="text-transform:uppercase">
    <button class="btn" id="join-btn" onclick="joinClass()">Join Class</button>
    <div class="error" id="join-error"></div>
  </div>

  <div class="section-title">Your Class</div>
  <div id="my-class-wrap">
    <div style="text-align:center;padding:20px"><div class="spinner"></div></div>
  </div>

  <div class="section-title">Leaderboards</div>
  <div id="leaderboards-wrap">
    <div style="text-align:center;padding:20px"><div class="spinner"></div></div>
  </div>
</div>

<script>
var API='https://api.reactificgaming.com';
var token=localStorage.getItem('rct-token');
var user=JSON.parse(localStorage.getItem('rct-user')||'null');

if(!token||!user){
  window.location.href='/index.html';
  throw new Error('Not logged in');
}

document.getElementById('uname').textContent=user.username||'Student';

function signOut(){
  localStorage.removeItem('rct-token');
  localStorage.removeItem('rct-user');
  window.location.href='/index.html';
}

async function joinClass(){
  var code=document.getElementById('class-code').value.trim().toUpperCase();
  if(!code){document.getElementById('join-error').textContent='Enter your class code';return}
  var btn=document.getElementById('join-btn');
  btn.disabled=true;btn.textContent='Joining...';
  document.getElementById('join-error').textContent='';
  try{
    var res=await fetch(API+'/api/classes/join',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code})});
    var data=await res.json();
    if(!res.ok)throw new Error(data.error||'Error');
    document.getElementById('class-code').value='';
    loadMyClass();
  }catch(e){document.getElementById('join-error').textContent=e.message}
  btn.disabled=false;btn.textContent='Join Class';
}

async function loadMyClass(){
  var wrap=document.getElementById('my-class-wrap');
  wrap.innerHTML='<div style="text-align:center;padding:20px"><div class="spinner"></div></div>';
  try{
    var res=await fetch(API+'/api/classes/mine',{headers:{'Authorization':'Bearer '+token}});
    if(!res.ok){wrap.innerHTML='<div style="color:#c53030">Error</div>';return}
    var data=await res.json();
    var cls=data.class;
    if(!cls){wrap.innerHTML='<div>Join a class to see your leaderboards</div>';return}
    wrap.innerHTML='<div style="font-size:0.9rem;font-weight:600">'+cls.name+'</div><div style="font-size:0.75rem;color:#8892a0;margin-top:4px">Code: '+cls.code+'</div>';
  }catch(e){wrap.innerHTML='<div style="color:#c53030">Error</div>'}
}

loadMyClass();
</script>

</body>
</html>
